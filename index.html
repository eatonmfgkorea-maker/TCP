<script>
(function() {
  const AUTH_URL = 'https://script.google.com/macros/s/AKfycbyhM1MJAEflRpDIKa0vWKQdcY4h1WVkI8KZqGuKjgOQDCt7iRwcsexXSmhtSdTwwepH/exec';
  const PORTAL_URL = 'https://eatonmfgkorea-maker.github.io/MFGManagement/';
  
  function isAuthed() {
    const token = localStorage.getItem('mfg_auth_token');
    const expiry = parseInt(localStorage.getItem('mfg_auth_expiry') || '0');
    return token && Date.now() < expiry;
  }
  
  if (isAuthed()) return;
  
  function injectModal() {
    const div = document.createElement('div');
    div.id = 'mfgAuthOverlay';
    div.style.cssText = 'position:fixed;inset:0;background:rgba(10,14,26,0.95);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:99999;display:flex;align-items:center;justify-content:center;font-family:Pretendard,"Malgun Gothic",-apple-system,sans-serif;padding:1rem;';
    div.innerHTML = `
      <div style="background:#0f172a;border:1px solid rgba(255,255,255,0.1);border-radius:1rem;padding:2rem;width:100%;max-width:28rem;box-shadow:0 25px 50px -12px rgba(0,0,0,0.5);">
        <div style="text-align:center;margin-bottom:1.5rem;">
          <div style="display:inline-flex;align-items:center;justify-content:center;width:4rem;height:4rem;border-radius:1rem;background:rgba(59,130,246,0.2);border:1px solid rgba(96,165,250,0.3);margin-bottom:1rem;">
            <svg style="width:2rem;height:2rem;color:#60a5fa;" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z"/></svg>
          </div>
          <h2 style="font-size:1.5rem;font-weight:bold;color:#fff;margin:0;">로그인이 필요합니다</h2>
          <p style="font-size:0.875rem;color:#94a3b8;margin-top:0.5rem;margin-bottom:0;">이 앱을 사용하려면 로그인해주세요</p>
        </div>
        <label style="display:block;font-size:0.875rem;color:#cbd5e1;margin-bottom:0.375rem;">ID</label>
        <input id="mfgAuthUserId" type="text" autocomplete="username" placeholder="ID" style="width:100%;padding:0.625rem 1rem;background:#1e293b;border:1px solid #334155;border-radius:0.5rem;color:#fff;outline:none;font-size:1rem;margin-bottom:1rem;box-sizing:border-box;" />
        <label style="display:block;font-size:0.875rem;color:#cbd5e1;margin-bottom:0.375rem;">비밀번호</label>
        <input id="mfgAuthPassword" type="password" autocomplete="current-password" placeholder="••••••••" style="width:100%;padding:0.625rem 1rem;background:#1e293b;border:1px solid #334155;border-radius:0.5rem;color:#fff;outline:none;font-size:1rem;margin-bottom:1rem;box-sizing:border-box;" />
        <div id="mfgAuthError" style="display:none;font-size:0.875rem;color:#f87171;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);border-radius:0.5rem;padding:0.5rem 0.75rem;margin-bottom:1rem;"></div>
        <button id="mfgAuthBtn" style="width:100%;padding:0.625rem;background:#2563eb;color:#fff;font-weight:600;border:none;border-radius:0.5rem;cursor:pointer;font-size:1rem;">로그인</button>

        </div>
      </div>
    `;
    document.body.appendChild(div);
    document.body.style.overflow = 'hidden';
    
    const userIdEl = document.getElementById('mfgAuthUserId');
    const pwdEl = document.getElementById('mfgAuthPassword');
    const btnEl = document.getElementById('mfgAuthBtn');
    const errEl = document.getElementById('mfgAuthError');
    
    setTimeout(() => userIdEl.focus(), 100);
    
    async function doLogin() {
      const userId = userIdEl.value.trim();
      const password = pwdEl.value;
      if (!userId || !password) {
        errEl.textContent = 'ID와 비밀번호를 입력해주세요.';
        errEl.style.display = 'block';
        return;
      }
      btnEl.disabled = true;
      btnEl.textContent = '로그인 중...';
      errEl.style.display = 'none';
      try {
        const res = await fetch(AUTH_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action: 'login', userId, password })
        });
        const data = await res.json();
        if (!data.ok) {
          errEl.textContent = data.error || '로그인 실패';
          errEl.style.display = 'block';
          btnEl.disabled = false;
          btnEl.textContent = '로그인';
          return;
        }
        localStorage.setItem('mfg_auth_token', data.token);
        localStorage.setItem('mfg_auth_user', data.userId);
        localStorage.setItem('mfg_auth_expiry', String(data.expiresAt));
        document.getElementById('mfgAuthOverlay').remove();
        document.body.style.overflow = '';
      } catch (e) {
        errEl.textContent = '네트워크 오류: ' + e.message;
        errEl.style.display = 'block';
        btnEl.disabled = false;
        btnEl.textContent = '로그인';
      }
    }
    
    btnEl.addEventListener('click', doLogin);
    pwdEl.addEventListener('keypress', (e) => { if (e.key === 'Enter') doLogin(); });
    userIdEl.addEventListener('keypress', (e) => { if (e.key === 'Enter') pwdEl.focus(); });
  }
  
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', injectModal);
  } else {
    injectModal();
  }
})();

  <!-- IndexedDB 헬퍼 (500MB 저장 지원) -->
  <script>
    const DB_NAME = 'TCP_ProductionDB';
    const DB_VERSION = 1;
    const STORE_NAME = 'appData';
    
    // IndexedDB 열기
    function openDB() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onerror = () => reject(request.error);
        request.onsuccess = () => resolve(request.result);
        request.onupgradeneeded = (event) => {
          const db = event.target.result;
          if (!db.objectStoreNames.contains(STORE_NAME)) {
            db.createObjectStore(STORE_NAME, { keyPath: 'key' });
          }
        };
      });
    }
    
    // 데이터 저장
    async function saveToIndexedDB(key, data) {
      try {
        const db = await openDB();
        const tx = db.transaction(STORE_NAME, 'readwrite');
        const store = tx.objectStore(STORE_NAME);
        store.put({ key, data, updatedAt: new Date().toISOString() });
        return new Promise((resolve, reject) => {
          tx.oncomplete = () => { db.close(); resolve(true); };
          tx.onerror = () => { db.close(); reject(tx.error); };
        });
      } catch (err) {
        console.error('IndexedDB 저장 오류:', err);
        return false;
      }
    }
    
    // 데이터 불러오기
    async function loadFromIndexedDB(key) {
      try {
        const db = await openDB();
        const tx = db.transaction(STORE_NAME, 'readonly');
        const store = tx.objectStore(STORE_NAME);
        const request = store.get(key);
        return new Promise((resolve, reject) => {
          request.onsuccess = () => { 
            db.close(); 
            resolve(request.result ? request.result.data : null); 
          };
          request.onerror = () => { db.close(); reject(request.error); };
        });
      } catch (err) {
        console.error('IndexedDB 로드 오류:', err);
        return null;
      }
    }
    
    // 저장된 데이터 크기 계산
    async function getStorageSize() {
      try {
        const db = await openDB();
        const tx = db.transaction(STORE_NAME, 'readonly');
        const store = tx.objectStore(STORE_NAME);
        const request = store.getAll();
        return new Promise((resolve) => {
          request.onsuccess = () => {
            const data = request.result;
            const size = new Blob([JSON.stringify(data)]).size;
            db.close();
            resolve(size);
          };
          request.onerror = () => { db.close(); resolve(0); };
        });
      } catch (err) {
        return 0;
      }
    }
  </script>

    return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
  };
  
  // 표준 계획비가동 스케줄 (주간 기준, 야간은 shift='야간' 일 때 +12h 적용)
  const getPlannedBreakSchedule = (selectedLog) => {
    if (!selectedLog) return [];
    const isNight = selectedLog.shift === '야간';
    const offset = isNight ? 12*60 : 0;
    
    const base = [
      { key: '오전체조',   name: '체조',           startMin: 8*60+30,  endMin: 8*60+35,  dur: 5,  saveType: '체조' },
      { key: '조회',       name: '조회',           startMin: 8*60+35,  endMin: 8*60+40,  dur: 5,  saveType: '조회' },
      { key: '오전쉼',     name: '오전 쉬는시간',  startMin: 10*60+30, endMin: 10*60+40, dur: 10, saveType: '휴식시간' },
      { key: '점심',       name: '점심시간',       startMin: 12*60+30, endMin: 13*60+30, dur: 60, saveType: '휴식시간' },
      { key: '오후체조',   name: '체조',           startMin: 13*60+30, endMin: 13*60+35, dur: 5,  saveType: '체조' },
      { key: '오후쉼',     name: '오후 쉬는시간',  startMin: 15*60+20, endMin: 15*60+30, dur: 10, saveType: '휴식시간' },
      { key: '저녁',       name: '저녁시간',       startMin: 17*60+30, endMin: 18*60,    dur: 30, saveType: '저녁시간' },
    ];
    
    const schedule = base.map(b => ({
      ...b,
      startMin: (b.startMin + offset) % (24*60),
      endMin: (b.endMin + offset) % (24*60),
      startTime: minutesToTime(b.startMin + offset),
      endTime: minutesToTime(b.endMin + offset),
    }));
    
    // 라인5S: 종료시각이 17:30/20:00 (또는 야간 05:30/08:00)인 경우
    const logEnd = selectedLog.endTime;
    const logEndMin = timeToMinutes(logEnd);
    const fiveSMin = activeSection === 'FE' ? 10 : 5;
    
    const fiveSTargets = ['17:30', '20:00', '05:30', '08:00'];
    if (fiveSTargets.includes(logEnd)) {
      const fiveSStartMin = logEndMin - fiveSMin;
      const fiveSStart = minutesToTime(fiveSStartMin < 0 ? fiveSStartMin + 24*60 : fiveSStartMin);
      schedule.push({
        key: '라인5S',
        name: `라인5S (${activeSection})`,
        startTime: fiveSStart,
        endTime: logEnd,
        startMin: fiveSStartMin < 0 ? fiveSStartMin + 24*60 : fiveSStartMin,
        endMin: logEndMin,
        dur: fiveSMin,
        saveType: '라인5S',
      });
    }
    
    return schedule;
  };
  
  const isScheduleInWorkRange = (scheduleStart, scheduleEnd, log) => {
    const ws = timeToMinutes(log.startTime);
    const we = timeToMinutes(log.endTime);
    const ss = timeToMinutes(scheduleStart);
    const se = timeToMinutes(scheduleEnd);
    
    const wsAbs = ws;
    const weAbs = we < ws ? we + 24*60 : we;
    
    let ssAbs = ss;
    let seAbs = se < ss ? se + 24*60 : se;
    if (ssAbs < wsAbs) { ssAbs += 24*60; seAbs += 24*60; }
    
    return ssAbs >= wsAbs && seAbs <= weAbs;
  };
  
  const isPlannedBreakChecked = (schedule, selectedLogId) => {
    if (!selectedLogId) return false;
    const logDts = downtimeLogs.filter(d => 
      d.productionLogId === selectedLogId && 
      d.downtimeCategory === '계획'
    );
    return logDts.some(d => d.startTime === schedule.startTime && d.endTime === schedule.endTime);
  };
  
  const togglePlannedBreak = (schedule) => {
    if (!selectedLogId) return;
    const existing = downtimeLogs.find(d =>
      d.productionLogId === selectedLogId &&
      d.downtimeCategory === '계획' &&
      d.startTime === schedule.startTime &&
      d.endTime === schedule.endTime
    );
    if (existing) {
      setDowntimeLogs(prev => prev.filter(d => d.id !== existing.id));
    } else {
      const newDt = {
        downtimeType: schedule.saveType,
        downtimeCategory: '계획',
        startTime: schedule.startTime,
        endTime: schedule.endTime,
        content: schedule.name,
        productionLogId: selectedLogId,
        id: Date.now() + Math.random(),
        createdAt: new Date().toLocaleString('ko-KR'),
        isEtc: false
      };
      setDowntimeLogs(prev => [newDt, ...prev]);
    }
  };
  
  // 계획비가동 자동 추가 함수
  const addPlannedDowntimes = (log) => {
    // TCP 기준 계획비가동 (5S+는 종료 5분 전)
    const plannedDowntimeSchedule = [
      { name: '체조', start: '08:30', end: '08:35' },
      { name: '조회', start: '08:35', end: '08:40' },
      { name: '쉬는시간', start: '10:30', end: '10:40' },
      { name: '점심시간', start: '12:30', end: '13:30' },
      { name: '체조', start: '13:30', end: '13:35' },
      { name: '쉬는시간', start: '15:20', end: '15:30' },
      { name: '저녁시간', start: '17:30', end: '18:00' }
    ];
    
    // 5S+ 시간 (TCP: 5분, FE: 10분)
    const fiveSMinutes = 5; // TCP는 5분
    
    const logStartMinutes = timeToMinutes(log.startTime);
    const logEndMinutes = timeToMinutes(log.endTime);
    
    // 자정을 넘어가는지 확인
    const crossesMidnight = logEndMinutes < logStartMinutes;
    
    // 시간이 작업 범위 내에 있는지 확인하는 함수
    const isTimeInWorkRange = (timeMinutes) => {
      if (crossesMidnight) {
        return timeMinutes >= logStartMinutes || timeMinutes < logEndMinutes;
      }
      return timeMinutes >= logStartMinutes && timeMinutes < logEndMinutes;
    };
    
    // 겹치는 시간 계산
    const getOverlapTime = (scheduleStart, scheduleEnd) => {
      const schedStartMin = timeToMinutes(scheduleStart);
      const schedEndMin = timeToMinutes(scheduleEnd);
      
      // 작업 시간 범위와 계획비가동 시간이 겹치는 부분 계산
      let overlapStart = null;
      let overlapEnd = null;
      
      if (crossesMidnight) {
        // 자정을 넘어가는 경우 (야간)
        // 스케줄이 완전히 작업 시간 내에 있는지 확인
        if ((schedStartMin >= logStartMinutes || schedStartMin < logEndMinutes) &&
            (schedEndMin > logStartMinutes || schedEndMin <= logEndMinutes)) {
          overlapStart = Math.max(schedStartMin, logStartMinutes);
          overlapEnd = Math.min(schedEndMin, logEndMinutes < schedEndMin ? logEndMinutes + 24 * 60 : logEndMinutes);
          if (overlapEnd > 24 * 60) overlapEnd -= 24 * 60;
          if (overlapStart > overlapEnd && !crossesMidnight) return null;
        } else {
          return null;
        }
      } else {
        // 일반적인 경우 (주간)
        overlapStart = Math.max(schedStartMin, logStartMinutes);
        overlapEnd = Math.min(schedEndMin, logEndMinutes);
        
        if (overlapStart >= overlapEnd) return null;
      }
      
      return {
        start: minutesToTime(overlapStart),
        end: minutesToTime(overlapEnd)
      };
    };
    
    const newDowntimes = [];
    
    // 각 계획비가동 시간대 확인
    plannedDowntimeSchedule.forEach(schedule => {
      const overlap = getOverlapTime(schedule.start, schedule.end);
      
      if (overlap) {
        // 중복 체크 (같은 날짜, 같은 라인, 같은 비가동 유형, 같은 시간)
        const isDuplicate = downtimeLogs.some(d => {
          const sameLog = productionLogs.find(l => l.id === d.productionLogId);
          return sameLog && 
                 sameLog.productionDate === log.productionDate &&
                 sameLog.lineName === log.lineName &&
                 d.downtimeType === schedule.name &&
                 d.startTime === overlap.start &&
                 d.endTime === overlap.end;
        });
        
        if (!isDuplicate) {
          newDowntimes.push({
            downtimeType: schedule.name,
            downtimeCategory: '계획',
            startTime: overlap.start,
            endTime: overlap.end,
            content: schedule.name,
            productionLogId: log.id,
            id: Date.now() + Math.random(),
            createdAt: new Date().toLocaleString('ko-KR'),
            isEtc: false
          });
        }
      }
    });
    
    // 5S+ 추가 (작업 종료 5분 전)
    if (logEndMinutes > 0) {
      const fiveSStart = logEndMinutes - fiveSMinutes;
      const fiveSStartTime = minutesToTime(fiveSStart < 0 ? fiveSStart + 24 * 60 : fiveSStart);
      const fiveSEndTime = log.endTime;
      
      // 중복 체크
      const is5SDuplicate = downtimeLogs.some(d => {
        const sameLog = productionLogs.find(l => l.id === d.productionLogId);
        return sameLog && 
               sameLog.productionDate === log.productionDate &&
               sameLog.lineName === log.lineName &&
               d.downtimeType === '5S+' &&
               d.startTime === fiveSStartTime &&
               d.endTime === fiveSEndTime;
      });
      
      if (!is5SDuplicate) {
        newDowntimes.push({
          downtimeType: '5S+',
          downtimeCategory: '계획',
          startTime: fiveSStartTime,
          endTime: fiveSEndTime,
          content: '5S+',
          productionLogId: log.id,
          id: Date.now() + Math.random() + 0.5,
          createdAt: new Date().toLocaleString('ko-KR'),
          isEtc: false
        });
      }
    }
    
    // 비가동 로그에 추가
    if (newDowntimes.length > 0) {
      setDowntimeLogs(prev => [...newDowntimes, ...prev]);
    }
  };
  
  // 공수 계산 함수 (실제 작업시간 vs 급여시간)
  const calculateManHours = (log) => {
    const startMinutes = timeToMinutes(log.startTime);
    const endMinutes = timeToMinutes(log.endTime);
    const workers = parseInt(log.workers) || 0;
    const shift = log.shift; // 주간/야간
    
    // 시간대 정의 (분 단위)
    const DAY_START = 8 * 60 + 30;   // 08:30
    const DAY_END = 17 * 60 + 30;    // 17:30
    const DAY_LUNCH_START = 12 * 60 + 30; // 12:30
    const DAY_LUNCH_END = 13 * 60 + 30;   // 13:30
    const DAY_DINNER_START = 17 * 60 + 30; // 17:30
    const DAY_DINNER_END = 18 * 60;        // 18:00
    
    const NIGHT_START = 20 * 60 + 30; // 20:30
    const NIGHT_END = 5 * 60 + 30;    // 05:30 (다음날)
    const NIGHT_MEAL_START = 0 * 60 + 30;  // 00:30
    const NIGHT_MEAL_END = 1 * 60 + 30;    // 01:30
    const NIGHT_BREAKFAST_START = 5 * 60 + 30; // 05:30
    const NIGHT_BREAKFAST_END = 6 * 60;        // 06:00
    
    let actualWorkMinutes = 0; // 실제 작업시간
    let paidMinutes = 0;       // 급여시간
    let overtimeMinutes = 0;   // 잔업시간 (급여 기준)
    
    // 총 근무시간 계산
    let totalMinutes = 0;
    if (endMinutes >= startMinutes) {
      totalMinutes = endMinutes - startMinutes;
    } else {
      // 자정을 넘어가는 경우
      totalMinutes = (24 * 60 - startMinutes) + endMinutes;
    }
    
    if (shift === '주간') {
      // 주간 기본근무: 08:30~17:30 (점심 1시간 제외 = 8시간)
      // 시작이 08:30 이전이면 08:30부터 계산
      const effectiveStart = Math.max(startMinutes, DAY_START);
      const effectiveEnd = endMinutes > DAY_END ? DAY_END : endMinutes;
      
      if (effectiveEnd > effectiveStart) {
        let baseMinutes = effectiveEnd - effectiveStart;
        // 점심시간이 포함되어 있으면 제외
        if (effectiveStart < DAY_LUNCH_END && effectiveEnd > DAY_LUNCH_START) {
          const lunchOverlap = Math.min(effectiveEnd, DAY_LUNCH_END) - Math.max(effectiveStart, DAY_LUNCH_START);
          baseMinutes -= Math.max(0, lunchOverlap);
        }
        actualWorkMinutes += baseMinutes;
        paidMinutes += baseMinutes;
      }
      
      // 잔업 계산 (17:30 이후)
      if (endMinutes > DAY_END || endMinutes < startMinutes) {
        let overtimeEnd = endMinutes;
        if (endMinutes < startMinutes) {
          // 자정을 넘어가는 경우 (실제로는 드묾)
          overtimeEnd = endMinutes + 24 * 60;
        }
        
        const overtimeStart = DAY_END;
        const actualOvertimeMinutes = overtimeEnd - overtimeStart;
        
        // 저녁시간 (17:30~18:00): 급여 O, 작업 X
        if (overtimeEnd > DAY_DINNER_START) {
          const dinnerOverlap = Math.min(overtimeEnd, DAY_DINNER_END) - DAY_DINNER_START;
          if (dinnerOverlap > 0) {
            paidMinutes += dinnerOverlap; // 급여에만 포함
          }
        }
        
        // 실제 잔업 (18:00 이후)
        if (overtimeEnd > DAY_DINNER_END) {
          const actualOvertime = overtimeEnd - DAY_DINNER_END;
          actualWorkMinutes += actualOvertime;
          paidMinutes += actualOvertime;
          overtimeMinutes = actualOvertime + (overtimeEnd > DAY_DINNER_START ? Math.min(30, overtimeEnd - DAY_DINNER_START) : 0);
        } else if (overtimeEnd > DAY_DINNER_START) {
          overtimeMinutes = overtimeEnd - DAY_DINNER_START;
        }
      }
    } else {
      // 야간 기본근무: 20:30~05:30 (야식 1시간 제외 = 8시간)
      // 야간은 자정을 넘어가므로 복잡함
      let nightWorkMinutes = 0;
      
      // 20:30 ~ 24:00 구간
      if (startMinutes >= NIGHT_START || startMinutes < NIGHT_END) {
        const nightStart = startMinutes >= NIGHT_START ? startMinutes : NIGHT_START;
        const nightEndFirstPart = startMinutes >= NIGHT_START ? 24 * 60 : Math.min(endMinutes, NIGHT_END);
        
        if (startMinutes >= NIGHT_START) {
          // 20:30 이후 시작
          nightWorkMinutes += (24 * 60 - nightStart);
          // 00:00 ~ 05:30 구간
          nightWorkMinutes += Math.min(endMinutes, NIGHT_END);
        } else {
          // 자정 이후 시작 (00:00 ~ 05:30)
          nightWorkMinutes += Math.min(endMinutes, NIGHT_END) - startMinutes;
        }
      }
      
      // 야식시간 제외 (00:30~01:30)
      if ((startMinutes < NIGHT_MEAL_END || startMinutes >= NIGHT_START) && 
          (endMinutes > NIGHT_MEAL_START || endMinutes <= NIGHT_END)) {
        nightWorkMinutes -= 60; // 1시간 제외
      }
      
      actualWorkMinutes += Math.max(0, nightWorkMinutes);
      paidMinutes += Math.max(0, nightWorkMinutes);
      
      // 야간 잔업 (05:30 이후)
      if (endMinutes > NIGHT_END && endMinutes < NIGHT_START) {
        // 아침시간 (05:30~06:00): 급여 O, 작업 X
        if (endMinutes > NIGHT_BREAKFAST_START) {
          const breakfastOverlap = Math.min(endMinutes, NIGHT_BREAKFAST_END) - NIGHT_BREAKFAST_START;
          if (breakfastOverlap > 0) {
            paidMinutes += breakfastOverlap;
          }
        }
        
        // 실제 잔업 (06:00 이후)
        if (endMinutes > NIGHT_BREAKFAST_END) {
          const actualOvertime = endMinutes - NIGHT_BREAKFAST_END;
          actualWorkMinutes += actualOvertime;
          paidMinutes += actualOvertime;
          overtimeMinutes = actualOvertime + Math.min(30, endMinutes - NIGHT_BREAKFAST_START);
        } else if (endMinutes > NIGHT_BREAKFAST_START) {
          overtimeMinutes = endMinutes - NIGHT_BREAKFAST_START;
        }
      }
    }
    
    return {
      workers,
      actualWorkHours: Math.round(actualWorkMinutes / 60 * 100) / 100,
      paidHours: Math.round(paidMinutes / 60 * 100) / 100,
      overtimeHours: Math.round(overtimeMinutes / 60 * 100) / 100,
      totalActualManHours: Math.round((actualWorkMinutes / 60 * workers) * 100) / 100,
      totalPaidManHours: Math.round((paidMinutes / 60 * workers) * 100) / 100
    };
  };
  
  // 생산일지별 OEE 계산
  const calculateOEE = (log) => {
    // 1. 생산시간 계산 (분)
    const productionMinutes = calculateMinutesBetween(log.startTime, log.endTime);
    
    // 2. 비가동 시간 계산 (분)
    const logDowntimes = downtimeLogs.filter(d => d.productionLogId === log.id);
    let plannedDowntimeMinutes = 0;
    let unplannedDowntimeMinutes = 0;
    
    logDowntimes.forEach(d => {
      const downtimeMinutes = calculateMinutesBetween(d.startTime, d.endTime);
      if (d.downtimeCategory === '계획') {
        plannedDowntimeMinutes += downtimeMinutes;
      } else {
        unplannedDowntimeMinutes += downtimeMinutes;
      }
    });
    
    // 3. 실제 가동시간 = 생산시간 - 계획비가동 - 비가동
    const actualOperatingMinutes = Math.max(0, productionMinutes - plannedDowntimeMinutes - unplannedDowntimeMinutes);
    
    // 4. 부하시간 = 생산시간 - 계획비가동
    const loadTime = Math.max(0, productionMinutes - plannedDowntimeMinutes);
    
    // 5. 불량 수량 계산 (OEE 반영 설정된 것만)
    const logDefects = defectLogs.filter(d => d.productionLogId === log.id);
    const totalDefects = logDefects.reduce((sum, d) => {
      // 불량의 세부종류가 OEE 반영 설정인지 확인
      const defectType = settings[log.section]?.defectTypes?.find(dt => dt.name === d.defectType);
      if (defectType) {
        const subType = defectType.subTypes?.find(st => 
          (typeof st === 'string' ? st : st.name) === d.defectSubType
        );
        // 문자열이거나 oee가 명시적으로 false가 아닌 경우만 반영
        if (typeof subType === 'string' || subType?.oee !== false) {
          return sum + Number(d.quantity || 0);
        }
      }
      return sum;
    }, 0);
    
    // 6. 재작업 수량 계산
    const logReworks = reworkLogs.filter(r => r.productionLogId === log.id);
    const totalReworks = logReworks.reduce((sum, r) => sum + Number(r.quantity || 0), 0);
    
    // 7. 양품수량
    const goodQuantity = Number(log.goodQuantity) || 0;
    
    // 8. CT 조회 (기본수량 기준)
    const ctData = getCtForDate(log.section, log.item, Number(log.workers), log.productionDate);
    const ctBaseMinutes = settings[log.section].ctBaseMinutes || 60;
    
    // 9. 기준생산량 = 실제 가동시간 × (기본수량 / 60분)
    let targetOutput = 0;
    if (ctData && ctData.baseQty > 0) {
      targetOutput = (ctData.baseQty / ctBaseMinutes) * actualOperatingMinutes;
    }
    
    // 10. OEE 구성요소 계산
    // 가동률(A) = (생산시간 - 계획비가동 - 비가동) / (생산시간 - 계획비가동)
    const availability = loadTime > 0 ? (actualOperatingMinutes / loadTime) * 100 : 0;
    
    // 성능(P) = 양품수량 / 기준생산량
    const performance = targetOutput > 0 ? (goodQuantity / targetOutput) * 100 : 0;
    
    // 품질(Q) = (양품수량 - 재작업수량) / (양품수량 + 불량수량)
    const totalProduced = goodQuantity + totalDefects;
    const quality = totalProduced > 0 ? ((goodQuantity - totalReworks) / totalProduced) * 100 : 0;
    
    // OEE = A × P × Q
    const oee = (availability / 100) * (performance / 100) * (quality / 100) * 100;
    
    return {
      productionMinutes,
      plannedDowntimeMinutes,
      unplannedDowntimeMinutes,
      actualOperatingMinutes,
      loadTime,
      goodQuantity,
      totalDefects,
      totalReworks,
      totalProduced,
      targetOutput: Math.round(targetOutput),
      availability: Math.min(100, Math.max(0, availability)),
      performance: Math.min(100, Math.max(0, performance)),
      quality: Math.min(100, Math.max(0, quality)),
      oee: Math.min(100, Math.max(0, oee)),
      ctData
    };
  };
  
  // 여러 생산일지의 종합 OEE 계산
  const calculateAggregatedOEE = (logs) => {
    if (logs.length === 0) return null;
    
    let totalProductionMinutes = 0;
    let totalPlannedDowntime = 0;
    let totalUnplannedDowntime = 0;
    let totalGoodQuantity = 0;
    let totalDefects = 0;
    let totalReworks = 0;
    let totalTargetOutput = 0;
    
    logs.forEach(log => {
      const oeeData = calculateOEE(log);
      totalProductionMinutes += oeeData.productionMinutes;
      totalPlannedDowntime += oeeData.plannedDowntimeMinutes;
      totalUnplannedDowntime += oeeData.unplannedDowntimeMinutes;
      totalGoodQuantity += oeeData.goodQuantity;
      totalDefects += oeeData.totalDefects;
      totalReworks += oeeData.totalReworks;
      totalTargetOutput += oeeData.targetOutput;
    });
    
    const actualOperatingMinutes = Math.max(0, totalProductionMinutes - totalPlannedDowntime - totalUnplannedDowntime);
    const loadTime = Math.max(0, totalProductionMinutes - totalPlannedDowntime);
    const totalProduced = totalGoodQuantity + totalDefects;
    
    // 원시 값 계산
    const availabilityRaw = loadTime > 0 ? (actualOperatingMinutes / loadTime) * 100 : 0;
    const performanceRaw = totalTargetOutput > 0 ? (totalGoodQuantity / totalTargetOutput) * 100 : 0;
    const qualityRaw = totalProduced > 0 ? ((totalGoodQuantity - totalReworks) / totalProduced) * 100 : 0;
    
    // 표시용 값 (0~100% 범위 제한)
    const availability = Math.min(100, Math.max(0, availabilityRaw));
    const performance = Math.min(100, Math.max(0, performanceRaw));

    if (endMin < startMin) {

                            lines: loadedTCP.lines || [],
                            items: loadedTCP.items || [],
                            defectTypes: loadedTCP.defectTypes || [],

                          },

                            items: loadedFE.items || [],
                            defectTypes: loadedFE.defectTypes || [],
                            defectCodes: loadedFE.defectCodes || defaultDefectCodes
                          }
                        };
                        
                        // 모든 상태를 한 번에 업데이트
                        setProductionLogs(data.productionLogs || []);
                        setDowntimeLogs(data.downtimeLogs || []);
                        // 불량/공정불량 통합
                        const mergedDefTcp2 = [
                          ...(data.defectLogs || []),
                          ...((data.processDefectLogs || []).map(d => ({
                            ...d,
                            originalType: d.originalType || 'process'
                          })))
                        ];
                        setDefectLogs(mergedDefTcp2);
                        setProcessDefectLogs([]);
                        setReworkLogs(data.reworkLogs || []);
                        setSettings(newSettings);
                        setEmployees(data.employees || []);
                        setOeeTargets(data.oeeTargets || {});

                        setAbsenceReasons(data.absenceReasons || {});
                        setLotData(data.lotData || {});
                        setLotHiddenBoms(data.lotHiddenBoms || {});
                        
                        var savedInfo = data.savedAt ? '\n저장 시간: ' + new Date(data.savedAt).toLocaleString() : '';
                        setFormError('✅ 데이터를 불러왔습니다!' + savedInfo);
                        
                      } catch (err) {

                          setFormData({
                            productionDate: log.productionDate,
                            lineName: log.lineName,

                            partNo: log.partNo,
                            lotNo: log.lotNo, // Lot No도 복사
                            shift: log.shift,
                            workers: log.workers,

                            startTime: '', // 시작시간은 새로 입력

                                <input
                                  type="date"
                                  value={log.productionDate}

                                  className="w-full px-1 py-1 text-sm border border-yellow-400 rounded focus:ring-1 focus:ring-yellow-500 bg-yellow-50"
                                />

                                <span className="text-sm">{log.productionDate}</span>
                              )}

                                <select
                                  value={log.lineName}
                                  onChange={(e) => updateLog('lineName', e.target.value)}
                                  className="w-full px-1 py-1 text-sm border border-yellow-400 rounded focus:ring-1 focus:ring-yellow-500 bg-yellow-50"
                                >

                                    <option key={line.name} value={line.name}>{line.name}</option>
                                  ))}
                                </select>
                              ) : (
                                <span className="text-sm">{log.lineName}</span>
                              )}

                            <td className="px-2 py-2 border-b">
                              {isEditing ? (
                                <select
                                  value={log.item}
                                  onChange={(e) => {
                                    const newItem = e.target.value;
                                    const partNos = getPartNosForItem(newItem);
                                    const newPartNo = partNos.length === 1 ? partNos[0].partNo : '';
                                    updateLog('item', newItem);
                                    if (newPartNo) updateLog('partNo', newPartNo);
                                  }}
                                  className="w-full px-1 py-1 text-sm border border-yellow-400 rounded focus:ring-1 focus:ring-yellow-500 bg-yellow-50"
                                >
                                  {(settings[activeSection]?.items || []).map(item => (
                                    <option key={item.item} value={item.item}>{item.item}</option>
                                  ))}
                                </select>
                              ) : (
                                <span className="text-sm">{log.item}</span>
                              )}

                            <td className="px-2 py-2 border-b">
                              {isEditing ? (
                                <select
                                  value={log.partNo}
                                  onChange={(e) => updateLog('partNo', e.target.value)}
                                  className="w-full px-1 py-1 text-sm border border-yellow-400 rounded focus:ring-1 focus:ring-yellow-500 bg-yellow-50"

                                  <option value="">선택</option>
                                  {getPartNosForItem(log.item).map(p => (
                                    <option key={p.partNo} value={p.partNo}>{p.partNo}</option>
                                  ))}
                                </select>

                                <span className="text-sm">{log.partNo}</span>
                              )}

                            <td className="px-2 py-2 border-b">

                                <input
                                  type="text"
                                  value={log.lotNo}

                                  className="w-full px-1 py-1 text-sm border border-yellow-400 rounded focus:ring-1 focus:ring-yellow-500 bg-yellow-50"
                                />
                              ) : (
                                <span className="text-sm">{log.lotNo}</span>
                              )}
                            </td>
                            <td className="px-2 py-2 border-b text-center">
                              {isEditing ? (
                                <select
                                  value={log.shift}
                                  onChange={(e) => updateLog('shift', e.target.value)}
                                  className={`px-2 py-1 rounded text-xs font-medium border border-yellow-400 bg-yellow-50`}
                                >

                                  <option value="야간">야간</option>
                                </select>

                                <span className={`px-2 py-1 rounded text-xs font-medium ${
                                  log.shift === '주간' ? 'bg-yellow-100 text-yellow-800' : 'bg-indigo-100 text-indigo-800'
                                }`}>{log.shift}</span>
                              )}

                            <td className="px-2 py-2 border-b text-center">

                                  <input
                                    type="number"
                                    value={log.workers}
                                    onChange={(e) => updateLog('workers', e.target.value)}
                                    className="w-10 px-1 py-1 text-sm text-center border border-yellow-400 rounded focus:ring-1 focus:ring-yellow-500 bg-yellow-50"
                                    min="1"
                                  />
                                ) : (
                                  <span className="text-sm">{log.workers}명</span>
                                )}
                                <div className="relative group">
                                  <button
                                    type="button"
                                    onClick={() => {
                                      const initial = (log.selectedWorkers || []).map(w => 
                                        typeof w === 'object' && w !== null
                                          ? { id: w.id, shared: !!w.shared }
                                          : { id: typeof w === 'number' ? w : Number(w), shared: false }
                                      );
                                      setEditWorkerModal({
                                        show: true,
                                        logId: log.id,
                                        workers: log.workers,
                                        selectedWorkers: initial
                                      });
                                    }}
                                    className="text-indigo-600 hover:text-indigo-800 hover:bg-indigo-50 px-1 py-1 rounded transition-colors text-xs"
                                  >

                                      <div className="bg-gray-800 text-white text-xs rounded-lg py-2 px-3 whitespace-nowrap shadow-lg">
                                        {log.selectedWorkers.map((w, idx) => {

                                          const isShared = typeof w === 'object' && w.shared;
                                          const emp = employees.find(e => e.id === workerId);
                                          const name = emp ? emp.name : workerId;
                                          return (
                                            <span key={idx}>
                                              {idx > 0 && ', '}
                                              {name}
                                              {isShared && <span className="text-orange-300">(공유)</span>}

                                        })}

                                      <div className="absolute top-full left-1/2 transform -translate-x-1/2 border-4 border-transparent border-t-gray-800"></div>
                                    </div>

                              </div>
                            </td>
                            <td className="px-2 py-2 border-b text-right">
                              {isEditing ? (
                                <input
                                  type="number"
                                  value={log.goodQuantity}

                                  className="w-20 px-1 py-1 text-sm text-right border border-yellow-400 rounded focus:ring-1 focus:ring-yellow-500 bg-yellow-50 font-semibold"
                                />

                              {isEditing ? (
                                <input
                                  type="number"
                                  value={log.time}
                                  onChange={(e) => updateLog('time', e.target.value)}
                                  className="w-12 px-1 py-1 text-sm text-center border border-yellow-400 rounded focus:ring-1 focus:ring-yellow-500 bg-yellow-50"

                              ) : (
                                <span className="text-sm">{log.time}T</span>
                              )}
                            </td>
                            <td className="px-2 py-2 border-b text-center">
                              {isEditing ? (
                                <input
                                  type="text"
                                  value={log.startTime}
                                  onChange={(e) => updateLog('startTime', e.target.value)}
                                  onBlur={(e) => updateLog('startTime', formatTimeInput(e.target.value))}
                                  placeholder="08:30"
                                  className="w-16 px-1 py-1 text-sm text-center border border-yellow-400 rounded focus:ring-1 focus:ring-yellow-500 bg-yellow-50"
                                />
                              ) : (
                                <span className="text-sm">{log.startTime}</span>
                              )}
                            </td>
                            <td className="px-2 py-2 border-b text-center">
                              {isEditing ? (
                                <input
                                  type="text"
                                  value={log.endTime}
                                  onChange={(e) => updateLog('endTime', e.target.value)}
                                  onBlur={(e) => updateLog('endTime', formatTimeInput(e.target.value))}
                                  placeholder="17:30"
                                  className="w-16 px-1 py-1 text-sm text-center border border-yellow-400 rounded focus:ring-1 focus:ring-yellow-500 bg-yellow-50"
                                />
                              ) : (
                                <span className="text-sm">{log.endTime}</span>
                              )}
                            </td>
                            <td className="px-2 py-2 border-b text-center">
                              <span className={`text-sm font-semibold ${activeSection === 'TCP' ? 'text-blue-600' : 'text-green-600'}`}>
                                {calculateMinutesBetween(log.startTime, log.endTime)}분
                              </span>
                            </td>
                            <td className="px-2 py-2 border-b text-center">
                              <div className="flex items-center gap-1 justify-center">
                                {isEditing ? (
                                  <button
                                    type="button"
                                    onClick={() => setEditingLogId(null)}
                                    className="text-green-600 hover:text-green-800 hover:bg-green-50 px-2 py-1 rounded transition-colors text-sm font-medium"
                                  >
                                    완료
                                  </button>
                                ) : (
                                  <button
                                    type="button"
                                    onClick={() => setEditingLogId(log.id)}
                                    className="text-yellow-600 hover:text-yellow-800 hover:bg-yellow-50 px-2 py-1 rounded transition-colors text-sm"
                                  >
                                    수정
                                  </button>
                                )}
                                <button
                                  type="button"
                                  onClick={copyToForm}
                                  className="text-blue-500 hover:text-blue-700 hover:bg-blue-50 px-2 py-1 rounded transition-colors text-sm"
                                  title="입력창으로 복사"
                                >
                                  복사
                                </button>
                                <button
                                  type="button"
                                  onClick={() => deleteLog(log.id)}
                                  className="text-red-500 hover:text-red-700 hover:bg-red-50 px-2 py-1 rounded transition-colors text-sm"
                                >
                                  삭제
                                </button>
                              </div>
                            </td>
                          </tr>
                        );
                      })
                    )}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
        )}
        
        {/* 필터 드롭다운 외부 클릭 시 닫기 */}
        {showLogFilter && (
          <div 
            className="fixed inset-0 z-10" 
            onClick={() => setShowLogFilter(null)}
          />
        )}
        
        {/* 생산일지 인원 수정 모달 */}
        {editWorkerModal.show && (
          <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
            <div className="bg-white rounded-xl shadow-2xl w-full max-w-md max-h-[80vh] overflow-hidden">
              <div className={`px-6 py-4 border-b ${activeSection === 'TCP' ? 'bg-blue-500' : 'bg-green-500'}`}>
                <h3 className="text-lg font-bold text-white">
                  인원 명단 수정 ({editWorkerModal.selectedWorkers.length}/{editWorkerModal.workers}명)
                </h3>
              </div>
              
              <div className="p-4 overflow-y-auto max-h-[50vh]">
                <p className="text-sm text-gray-500 mb-3">
                  {editWorkerModal.workers}명을 선택해주세요. {Number(editWorkerModal.workers) % 1 !== 0 && '(소수점 인원: 공유 작업자 포함)'}
                </p>
                <div className="space-y-2">
                  {employees
                    .filter(emp => emp.section === activeSection && !emp.leaveDate)
                    .map(emp => {
                      const selectedEntry = editWorkerModal.selectedWorkers.find(w => 
                        (typeof w === 'object' ? w.id : w) === emp.id
                      );
                      const isSelected = !!selectedEntry;
                      const isShared = isSelected && typeof selectedEntry === 'object' && selectedEntry.shared;
                      
                      const wNum = Number(editWorkerModal.workers);
                      const maxCount = wNum % 1 !== 0 ? Math.ceil(wNum) : wNum;
                      const isDisabled = !isSelected && editWorkerModal.selectedWorkers.length >= maxCount;
                      
                      return (
                        <label
                          key={emp.id}
                          className={`flex items-center gap-3 p-3 rounded-lg border cursor-pointer transition-all ${
                            isSelected 
                              ? activeSection === 'TCP' 
                                ? 'bg-blue-50 border-blue-300' 
                                : 'bg-green-50 border-green-300'
                              : isDisabled
                                ? 'bg-gray-100 border-gray-200 cursor-not-allowed opacity-50'
                                : 'bg-white border-gray-200 hover:bg-gray-50'
                          }`}
                        >
                          <input
                            type="checkbox"
                            checked={isSelected}
                            disabled={isDisabled}
                            onChange={(e) => {
                              if (e.target.checked) {
                                setEditWorkerModal(prev => ({
                                  ...prev,
                                  selectedWorkers: [...prev.selectedWorkers, { id: emp.id, shared: false }]
                                }));
                              } else {
                                setEditWorkerModal(prev => ({
                                  ...prev,
                                  selectedWorkers: prev.selectedWorkers.filter(w => 
                                    (typeof w === 'object' ? w.id : w) !== emp.id
                                  )
                                }));
                              }
                            }}
                            className={`w-5 h-5 rounded ${
                              activeSection === 'TCP' 
                                ? 'text-blue-600 focus:ring-blue-500' 
                                : 'text-green-600 focus:ring-green-500'
                            }`}
                          />
                          <div className="flex-1">
                            <span className="font-medium text-gray-800">{emp.name}</span>
                            <span className={`ml-2 px-2 py-0.5 rounded text-xs ${
                              emp.role === '조장' 
                                ? 'bg-amber-100 text-amber-700' 
                                : 'bg-gray-100 text-gray-600'
                            }`}>
                              {emp.role}
                            </span>
                            {isSelected && Number(editWorkerModal.workers) % 1 !== 0 && (
                              <button
                                type="button"
                                onClick={(e) => {
                                  e.preventDefault();
                                  e.stopPropagation();
                                  setEditWorkerModal(prev => ({
                                    ...prev,
                                    selectedWorkers: prev.selectedWorkers.map(w => {
                                      const wid = typeof w === 'object' ? w.id : w;
                                      if (wid !== emp.id) return w;
                                      return { id: emp.id, shared: !(typeof w === 'object' && w.shared) };
                                    })
                                  }));
                                }}
                                className={`ml-2 px-2 py-0.5 rounded text-xs font-medium transition-colors ${
                                  isShared 
                                    ? 'bg-orange-100 text-orange-700 hover:bg-orange-200'
                                    : 'bg-gray-200 text-gray-600 hover:bg-gray-300'
                                }`}
                              >
                                {isShared ? '공유' : '전담'}
                              </button>
                            )}
                          </div>
                        </label>
                      );
                    })}
                </div>
              </div>
              
              <div className="px-6 py-4 border-t bg-gray-50 flex justify-end gap-3">
                <button
                  type="button"
                  onClick={() => setEditWorkerModal({ show: false, logId: null, workers: [], selectedWorkers: [] })}
                  className="px-4 py-2 text-gray-700 bg-gray-200 rounded-lg hover:bg-gray-300 transition-colors"

                  type="button"
                  onClick={() => {

                      log.id === editWorkerModal.logId 
                        ? { ...log, selectedWorkers: editWorkerModal.selectedWorkers }
                        : log
                    ));
                    setEditWorkerModal({ show: false, logId: null, workers: [], selectedWorkers: [] });
                  }}
                  className={`px-4 py-2 text-white rounded-lg transition-colors ${
                    activeSection === 'TCP' 
                      ? 'bg-blue-600 hover:bg-blue-700' 
                      : 'bg-green-600 hover:bg-green-700'

                >
                  확인
                </button>
              </div>
            </div>
          </div>
        )}

                    const workers = Number(log.workers) || 1;
                    return durationHours * workers;

                  // 근무 유형 판별 (시작시간, 종료시간 기반)

                  const activeEmployees = employees.filter(emp =>

                  activeEmployees.forEach(emp => {

                  dayLogs.forEach(log => {
                    // 실제 시작/종료 시간 사용
                    let startHour = timeToNumber(log.startTime);

                    // 야간 근무 처리 (종료가 시작보다 작으면 다음날)
                    if (endHour < startHour) {
                      endHour += 24;
                    }
                    
                    // 야간조 연속분 처리: 다음날 productionDate + 새벽 시작 → 익일로 표시 (+24)
                    if (log.productionDate === nextDateStr) {
                      startHour += 24;

                    }
                    // 같은 일자에 야간 연속분이 잘못 들어간 경우 (startHour<8, endHour<=8) → +24
                    else if (startHour < 8 && endHour <= 8) {

                    // 식사시간 계산 (실제 근무 시간 범위 내의 식사시간만)
                    const breaks = [];
                    // 주간 점심 (12:30~13:30)
                    if (startHour <= 12.5 && endHour >= 13.5) {
                      breaks.push({ start: 12.5, end: 13.5 });
                    }
                    // 주간 저녁전 (17:30~18:00) - 잔업 시
                    if (startHour <= 17.5 && endHour >= 18) {
                      breaks.push({ start: 17.5, end: 18 });

                    // 야간 야식 (00:30~01:30, 즉 24.5~25.5)
                    if (startHour <= 24.5 && endHour >= 25.5) {
                      breaks.push({ start: 24.5, end: 25.5 });
                    }
                    // 야간 아침전 (05:30~06:00, 즉 29.5~30)
                    if (startHour <= 29.5 && endHour >= 30) {
                      breaks.push({ start: 29.5, end: 30 });
                    }
                    
                    const shiftType = getShiftType(log);
                    
                    // selectedWorkers 처리 - ID인지 이름인지 확인
                    const workers = log.selectedWorkers && log.selectedWorkers.length > 0 
                      ? log.selectedWorkers 
                      : [];
                    
                    workers.forEach(workerIdOrName => {
                      // ID인 경우 이름으로 변환, 이름인 경우 그대로 사용
                      let workerName;
                      let isShared = false;
                      if (typeof workerIdOrName === 'number') {
                        const emp = employees.find(e => e.id === workerIdOrName);
                        workerName = emp ? emp.name : null;
                      } else if (typeof workerIdOrName === 'object' && workerIdOrName !== null) {
                        // 객체 형식 {id, shared} 처리
                        const emp = employees.find(e => e.id === workerIdOrName.id);
                        workerName = emp ? emp.name : null;
                        isShared = !!workerIdOrName.shared;
                      } else {
                        workerName = workerIdOrName;
                      }
                      
                      if (!workerName) return;
                      
                      if (!workerAttendance[workerName]) {
                        workerAttendance[workerName] = [];
                      }
                      workerAttendance[workerName].push({
                        lineName: log.lineName,
                        shiftType,
                        startHour,
                        endHour,
                        breaks,
                        isOvertime: shiftType.includes('잔업'),
                        logId: log.id
                      });
                    });

                  // 근무 기록이 있는 인원만 필터링
                  const workerNames = Object.keys(workerAttendance)

                  // 식사시간 제외한 실제 근무시간 계산 (시간 구간 합집합)
                  const calculateNetWorkHours = (attendances) => {
                    if (!attendances || attendances.length === 0) return { hours: 0, hasOvertime: false };
                    
                    // 1) 시간 구간 합집합 (겹치는 라인 시간 중복 제거)
                    const intervals = attendances.map(att => [att.startHour, att.endHour]).sort((a, b) => a[0] - b[0]);
                    const merged = [];
                    intervals.forEach(([s, e]) => {
                      if (merged.length === 0 || merged[merged.length - 1][1] < s) {
                        merged.push([s, e]);
                      } else {
                        merged[merged.length - 1][1] = Math.max(merged[merged.length - 1][1], e);
                      }
                    });
                    
                    let totalHours = merged.reduce((sum, [s, e]) => sum + (e - s), 0);
                    
                    // 식사시간 제외 (합집합 범위에 포함되는 식사시간만, 중복 제거)
                    const allBreaks = [];
                    attendances.forEach(att => {
                      if (att.breaks) {
                        att.breaks.forEach(brk => {
                          const isInUnion = merged.some(([s, e]) => brk.start >= s && brk.end <= e);
                          if (isInUnion) allBreaks.push([brk.start, brk.end]);
                        });
                      }
                    });
                    const uniqueBreaks = [];
                    allBreaks.sort((a, b) => a[0] - b[0]).forEach(([s, e]) => {
                      if (uniqueBreaks.length === 0 || uniqueBreaks[uniqueBreaks.length - 1][1] < s) {
                        uniqueBreaks.push([s, e]);
                      } else {
                        uniqueBreaks[uniqueBreaks.length - 1][1] = Math.max(uniqueBreaks[uniqueBreaks.length - 1][1], e);
                      }
                    });
                    const breakHours = uniqueBreaks.reduce((sum, [s, e]) => sum + (e - s), 0);
                    totalHours -= breakHours;
                    
                    const hasOvertime = attendances.some(att => att.isOvertime);
                    return { hours: totalHours, hasOvertime };
                  };

                  const isMealBreak = (hour, attendances) => {

                        }

                    return false;

                  ];

                    <>

                                        return (

                  const getWeekInfo = (date) => {
                    const d = new Date(date);
                    d.setHours(0, 0, 0, 0);
                    
                    // 해당 주의 일요일 찾기
                    const dayOfWeek = d.getDay(); // 0=일요일
                    const sunday = new Date(d);
                    sunday.setDate(d.getDate() - dayOfWeek);
                    
                    // 해당 주의 토요일
                    const saturday = new Date(sunday);
                    saturday.setDate(sunday.getDate() + 6);
                    
                    // 주차 계산: 토요일이 속한 연도의 1월 1일이 포함된 주를 1주차로

                    const jan1 = new Date(satYear, 0, 1);

                    // 1월 1일이 속한 주의 일요일
                    const firstSunday = new Date(jan1);
                    firstSunday.setDate(jan1.getDate() - jan1DayOfWeek);
                    
                    // 주차 계산
                    const diffDays = Math.floor((sunday - firstSunday) / (1000 * 60 * 60 * 24));

                    const firstDay = new Date(year, month, 1);
                    const lastDay = new Date(year, month + 1, 0);
                    
                    for (let d = new Date(firstDay); d <= lastDay; d.setDate(d.getDate() + 1)) {
                      const weekInfo = getWeekInfo(d);
                      const weekKey = `${weekInfo.year}-W${weekInfo.week}`;
                      
                      if (!weeksAdded.has(weekKey)) {
                        weeksAdded.add(weekKey);
                        weeks.push(weekInfo);
                      }
                    }
                    
                    return weeks;
                  };

                      const weekInfo = getWeekInfo(logDate);

                      const startMin = timeToMinutes(log.startTime);
                      let endMin = timeToMinutes(log.endTime);
                      const shift = log.shift || '주간';
                      if (endMin < startMin) endMin += 24 * 60;
                      
                      const workerIds = log.selectedWorkers || [];
                      workerIds.forEach(workerIdOrName => {
                        let workerName;
                        if (typeof workerIdOrName === 'object' && workerIdOrName !== null) {
                          const emp = employees.find(e => e.id === workerIdOrName.id);
                          workerName = emp?.name;
                        } else if (typeof workerIdOrName === 'string' && !workerIdOrName.match(/^\d+$/)) {
                          workerName = workerIdOrName;
                        } else {
                          const emp = employees.find(e => e.id === Number(workerIdOrName) || e.name === workerIdOrName);
                          workerName = emp?.name;
                        }
                        if (!workerName) return;
                        
                        if (!workerDayIntervals[workerName]) workerDayIntervals[workerName] = {};
                        const key = `${log.productionDate}|${shift}`;
                        if (!workerDayIntervals[workerName][key]) workerDayIntervals[workerName][key] = [];
                        workerDayIntervals[workerName][key].push([startMin, endMin]);
                      });
                    });
                  
                  // 2단계: 작업자별 일자별 union + 식사시간 제외 → 주차별 합산
                  Object.entries(workerDayIntervals).forEach(([workerName, dayMap]) => {
                    if (!workerWeeklyHours[workerName]) return;
                    
                    Object.entries(dayMap).forEach(([dayKey, intervals]) => {
                      const [dateStr, shift] = dayKey.split('|');
                      const weekInfo = getWeekInfo(new Date(dateStr));
                      const weekKey = `${weekInfo.year}-W${weekInfo.week}`;
                      
                      const sorted = intervals.slice().sort((a, b) => a[0] - b[0]);
                      const merged = [];
                      for (const [s, e] of sorted) {
                        if (merged.length && merged[merged.length-1][1] >= s) {
                          merged[merged.length-1][1] = Math.max(merged[merged.length-1][1], e);
                        } else {
                          merged.push([s, e]);
                        }

                      const meals = shift === '야간'

                      if (workerWeeklyHours[workerName][weekKey] === undefined) workerWeeklyHours[workerName][weekKey] = 0;
                      workerWeeklyHours[workerName][weekKey] += totalMin / 60;

        {/* 분석 탭 */}
        {activeTab === 'analysis' && (
          <div className="bg-white rounded-xl shadow-lg p-6">
            <h2 className="text-xl font-bold text-gray-800 mb-6">OEE 비교 분석</h2>
            
            {/* TCP / FE / E-Mobility 선택 + 월 선택 */}
            <div className="flex flex-wrap items-center gap-6 mb-6 p-4 bg-gray-50 rounded-lg">
              <div className="flex items-center gap-4">
                <label className="text-sm font-medium text-gray-600">비교월 (이전):</label>
                <input
                  type="month"
                  value={analysisBaseMonth}
                  onChange={(e) => setAnalysisBaseMonth(e.target.value)}
                  className="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-rose-500"
                />
              </div>
              
              <div className="flex items-center gap-2 text-2xl text-gray-400">→</div>
              
              <div className="flex items-center gap-4">
                <label className="text-sm font-medium text-gray-600">분석월 (이후):</label>
                <input
                  type="month"
                  value={analysisCompareMonth}
                  onChange={(e) => setAnalysisCompareMonth(e.target.value)}
                  className="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-rose-500"
                />
              </div>
            </div>
            
            {(() => {
              // 월별 데이터 가져오기 (섹션별 필터링)
              const getMonthLogs = (month) => {
                return productionLogs.filter(log => {
                  const monthMatch = log.productionDate.startsWith(month);
                  if (analysisSection === 'TCP') return monthMatch && log.section === 'TCP';
                  if (analysisSection === 'FE') return monthMatch && log.section === 'FE' && log.lineName !== 'FTIV';
                  if (analysisSection === 'E-Mobility') return monthMatch && log.section === 'FE' && log.lineName === 'FTIV';
                  return false;
                });
              };
              
              const baseLogs = getMonthLogs(analysisBaseMonth);
              const compareLogs = getMonthLogs(analysisCompareMonth);
              
              // OEE 계산 함수 (기존 로직 활용)
              const calculateMonthOEE = (logs) => {
                if (logs.length === 0) return null;
                
                let totalProductionMinutes = 0;
                let totalPlannedDowntime = 0;
                let totalUnplannedDowntime = 0;
                let totalGoodQty = 0;
                let totalBaseQty = 0;
                let totalDefects = 0;
                let totalReworks = 0;
                
                logs.forEach(log => {
                  const [startH, startM] = log.startTime.split(':').map(Number);
                  const [endH, endM] = log.endTime.split(':').map(Number);
                  let startMin = startH * 60 + startM;
                  let endMin = endH * 60 + endM;
                  if (endMin < startMin) endMin += 24 * 60;
                  const productionMin = endMin - startMin;
                  totalProductionMinutes += productionMin;
                  
                  // 비가동
                  const logDowntimes = downtimeLogs.filter(d => d.productionLogId === log.id);
                  logDowntimes.forEach(d => {
                    const [dsH, dsM] = d.startTime.split(':').map(Number);
                    const [deH, deM] = d.endTime.split(':').map(Number);
                    let dsMin = dsH * 60 + dsM;
                    let deMin = deH * 60 + deM;
                    if (deMin < dsMin) deMin += 24 * 60;
                    const downMin = deMin - dsMin;
                    if (d.downtimeCategory === '계획') {
                      totalPlannedDowntime += downMin;
                    } else {
                      totalUnplannedDowntime += downMin;
                    }
                  });
                  
                  // 양품
                  totalGoodQty += Number(log.goodQuantity) || 0;
                  
                  // 기준생산량 (E-Mobility는 FE 설정 사용)
                  const settingsSection = analysisSection === 'E-Mobility' ? 'FE' : analysisSection;
                  const itemData = settings[settingsSection].items.find(i => i.item === log.item);
                  if (itemData && itemData.ct && itemData.ct.length > 0) {
                    const workers = Number(log.workers);
                    const ctData = itemData.ct.find(c => c.workers === workers) || itemData.ct[0];
                    const actualOpMin = productionMin - logDowntimes.reduce((sum, d) => {
                      const [dsH, dsM] = d.startTime.split(':').map(Number);
                      const [deH, deM] = d.endTime.split(':').map(Number);
                      let dsMin = dsH * 60 + dsM;
                      let deMin = deH * 60 + deM;
                      if (deMin < dsMin) deMin += 24 * 60;
                      return sum + (deMin - dsMin);
                    }, 0);
                    totalBaseQty += (actualOpMin / 60) * (ctData?.baseQty || 100);
                  } else {
                    const actualOpMin = productionMin - logDowntimes.reduce((sum, d) => {
                      const [dsH, dsM] = d.startTime.split(':').map(Number);
                      const [deH, deM] = d.endTime.split(':').map(Number);
                      let dsMin = dsH * 60 + dsM;
                      let deMin = deH * 60 + deM;
                      if (deMin < dsMin) deMin += 24 * 60;
                      return sum + (deMin - dsMin);
                    }, 0);
                    totalBaseQty += (actualOpMin / 60) * 100;
                  }
                  
                  // 불량, 재작업
                  totalDefects += defectLogs.filter(d => d.productionLogId === log.id)
                    .reduce((sum, d) => sum + Number(d.quantity), 0);
                  totalReworks += reworkLogs.filter(r => r.productionLogId === log.id)
                    .reduce((sum, r) => sum + Number(r.quantity), 0);
                });
                
                const loadTime = totalProductionMinutes - totalPlannedDowntime;
                const actualOpTime = loadTime - totalUnplannedDowntime;
                
                const availability = loadTime > 0 ? (actualOpTime / loadTime) * 100 : 0;
                const performance = totalBaseQty > 0 ? (totalGoodQty / totalBaseQty) * 100 : 0;
                const quality = (totalGoodQty + totalDefects) > 0 
                  ? ((totalGoodQty - totalReworks) / (totalGoodQty + totalDefects)) * 100 : 0;
                const oee = (availability / 100) * (performance / 100) * (quality / 100) * 100;
                
                return {
                  logCount: logs.length,
                  productionMinutes: totalProductionMinutes,
                  plannedDowntime: totalPlannedDowntime,
                  unplannedDowntime: totalUnplannedDowntime,
                  actualOpTime,
                  goodQuantity: totalGoodQty,
                  baseQuantity: totalBaseQty,
                  defects: totalDefects,
                  reworks: totalReworks,
                  availability: Math.min(availability, 100),
                  performance: Math.min(performance, 200),
                  quality: Math.min(quality, 100),
                  oee: Math.min(oee, 100)
                };
              };
              
              // 작업시간 계산
              const calculateWorkHours = (logs) => {
                return logs.reduce((sum, log) => {
                  const [startH, startM] = log.startTime.split(':').map(Number);
                  const [endH, endM] = log.endTime.split(':').map(Number);
                  let startMin = startH * 60 + startM;
                  let endMin = endH * 60 + endM;
                  if (endMin < startMin) endMin += 24 * 60;
                  return sum + ((endMin - startMin) / 60) * Number(log.workers);
                }, 0);
              };
              
              // 아이템별 분석
              const getItemAnalysis = (logs) => {
                const items = {};
                logs.forEach(log => {
                  if (!items[log.item]) {
                    items[log.item] = { count: 0, goodQty: 0, workHours: 0 };
                  }
                  items[log.item].count++;
                  items[log.item].goodQty += Number(log.goodQuantity) || 0;
                  
                  const [startH, startM] = log.startTime.split(':').map(Number);
                  const [endH, endM] = log.endTime.split(':').map(Number);
                  let startMin = startH * 60 + startM;
                  let endMin = endH * 60 + endM;
                  if (endMin < startMin) endMin += 24 * 60;
                  items[log.item].workHours += ((endMin - startMin) / 60) * Number(log.workers);
                });
                return items;
              };
              
              // 비가동 분석
              const getDowntimeAnalysis = (logs) => {
                const types = {};
                logs.forEach(log => {
                  const logDowntimes = downtimeLogs.filter(d => d.productionLogId === log.id);
                  logDowntimes.forEach(d => {
                    if (!types[d.downtimeType]) {
                      types[d.downtimeType] = { category: d.downtimeCategory, minutes: 0, count: 0 };
                    }
                    const [dsH, dsM] = d.startTime.split(':').map(Number);
                    const [deH, deM] = d.endTime.split(':').map(Number);
                    let dsMin = dsH * 60 + dsM;
                    let deMin = deH * 60 + deM;
                    if (deMin < dsMin) deMin += 24 * 60;
                    types[d.downtimeType].minutes += (deMin - dsMin);
                    types[d.downtimeType].count++;
                  });
                });
                return types;
              };
              
              // 불량 분석
              const getDefectAnalysis = (logs) => {
                const types = {};
                logs.forEach(log => {
                  const logDefects = defectLogs.filter(d => d.productionLogId === log.id);
                  logDefects.forEach(d => {
                    if (!types[d.defectType]) {
                      types[d.defectType] = { quantity: 0, count: 0 };
                    }
                    types[d.defectType].quantity += Number(d.quantity);
                    types[d.defectType].count++;
                  });
                });
                return types;
              };
              
              const baseOEE = calculateMonthOEE(baseLogs);
              const compareOEE = calculateMonthOEE(compareLogs);
              
              const baseWorkHours = calculateWorkHours(baseLogs);
              const compareWorkHours = calculateWorkHours(compareLogs);
              
              const baseItems = getItemAnalysis(baseLogs);
              const compareItems = getItemAnalysis(compareLogs);
              
              const baseDowntime = getDowntimeAnalysis(baseLogs);
              const compareDowntime = getDowntimeAnalysis(compareLogs);
              
              const baseDefects = getDefectAnalysis(baseLogs);
              const compareDefects = getDefectAnalysis(compareLogs);
              
              // 증감 표시 함수
              const renderChange = (base, compare, unit = '', reverse = false) => {
                if (base === null || base === undefined) base = 0;
                if (compare === null || compare === undefined) compare = 0;
                const diff = compare - base;
                const isPositive = reverse ? diff < 0 : diff > 0;
                const isNegative = reverse ? diff > 0 : diff < 0;
                
                if (Math.abs(diff) < 0.01) return <span className="text-gray-400">-</span>;
                
                return (
                  <span className={`font-medium ${isPositive ? 'text-green-600' : isNegative ? 'text-red-600' : 'text-gray-600'}`}>
                    {diff > 0 ? '▲' : '▼'} {Math.abs(diff).toFixed(1)}{unit}
                  </span>
                );
              };
              
              if (!baseOEE && !compareOEE) {
                return (
                  <div className="text-center py-12 text-gray-400 border border-dashed border-gray-300 rounded-lg">
                    선택한 기간에 {analysisSection} 데이터가 없습니다.
                  </div>
                );
              }
              
              return (
                <div className="space-y-6">
                  {/* OEE 비교 요약 */}
                  <div className="grid grid-cols-2 gap-6">
                    <div className={`p-6 rounded-xl border-2 ${analysisSection === 'TCP' ? 'bg-blue-50 border-blue-200' : analysisSection === 'FE' ? 'bg-green-50 border-green-200' : 'bg-purple-50 border-purple-200'}`}>
                      <div className="text-sm text-gray-500 mb-2">비교월: {analysisBaseMonth}</div>
                      <div className="text-4xl font-bold text-gray-800 mb-4">{baseOEE ? baseOEE.oee.toFixed(1) : '-'}%</div>
                      <div className="grid grid-cols-3 gap-4 text-sm">
                        <div><span className="text-gray-500">A:</span> <span className="font-medium">{baseOEE ? baseOEE.availability.toFixed(1) : '-'}%</span></div>
                        <div><span className="text-gray-500">P:</span> <span className="font-medium">{baseOEE ? baseOEE.performance.toFixed(1) : '-'}%</span></div>
                        <div><span className="text-gray-500">Q:</span> <span className="font-medium">{baseOEE ? baseOEE.quality.toFixed(1) : '-'}%</span></div>

                {/* 직원 목록 테이블 */}
                <div className={`rounded-xl border-2 overflow-hidden ${

                  <div className="overflow-x-auto">

                      <tbody>
                        {employees
                          .filter(emp => emp.section === personnelSection)
                          .filter(emp => showResigned || !emp.leaveDate)

                            if (!a.leaveDate && b.leaveDate) return -1;
                            if (a.leaveDate && !b.leaveDate) return 1;
                            if (a.role === '조장' && b.role !== '조장') return -1;
                            if (a.role !== '조장' && b.role === '조장') return 1;
                            return new Date(a.joinDate) - new Date(b.joinDate);
                          })
                          .map((emp, index) => {
                            const joinDate = new Date(emp.joinDate);
                            const endDate = emp.leaveDate ? new Date(emp.leaveDate) : new Date();
                            const diffTime = Math.abs(endDate - joinDate);
                            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                            const years = Math.floor(diffDays / 365);
                            const months = Math.floor((diffDays % 365) / 30);
                            const tenure = years > 0 ? `${years}년 ${months}개월` : `${months}개월`;
                            
                            const updateEmployee = (field, value) => {
                              setEmployees(prev => prev.map(e => 
                                e.id === emp.id ? { ...e, [field]: value } : e
                              ));
                            };
                            
                            return (

                                  <select

                                    className={`px-2 py-1 rounded text-xs font-medium border ${
                                      emp.role === '조장' 
                                        ? 'bg-amber-100 text-amber-700 border-amber-200'

                                </td>

                                  ) : (
                                    <span className="px-2 py-1 bg-green-100 text-green-700 rounded-full text-xs font-medium">재직</span>
                                  )}
                                </td>
                                <td className="px-4 py-3 border-b text-center">
                                  {emp.leaveDate && (

                                  )}
                                  <button type="button" onClick={() => removeEmployee(emp.id)}

                                </td>

                        {employees.filter(emp => emp.section === personnelSection).filter(emp => showResigned || !emp.leaveDate).length === 0 && (
                          <tr><td colSpan="8" className="px-4 py-8 text-center text-gray-400">등록된 직원이 없습니다.</td></tr>
