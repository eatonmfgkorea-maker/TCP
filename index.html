                  </div>
                </div>
              </>
            )}
            
            {/* 인원편성 서브탭 */}
            {personnelSubTab === 'assign' && (() => {
              // TCP 공정 정의
              const tcpProcesses = [
                { name: '1PC', slots: 4 },
                { name: '2PC', slots: 5 },
                { name: 'Nospin', slots: 1 },
                { name: 'Pack', slots: 2 },
                { name: '세척', slots: 2 }
              ];
              // FE 공정 정의
              const feProcesses = [
                { name: 'LVS', slots: 2 },
                { name: 'A/FLVV', slots: 2 },
                { name: 'M/FLVV', slots: 3 },
                { name: 'A/GVV', slots: 2 },
                { name: 'M/GVV', slots: 4 },
                { name: 'UCC', slots: 3 },
                { name: 'FTIV', slots: 4 },
                { name: 'ICV', slots: 6 },
                { name: 'ES', slots: 2 },
                { name: 'Sub', slots: 2 }
              ];
              // 현재 섹션에 따른 공정 선택
              const processes = personnelSection === 'TCP' ? tcpProcesses : feProcesses;
              const leaderSlots = 3;
              const vacationSlots = 10;
              
              // 주 단위 날짜 배열 생성 (2주치)
              const getDatesForWeeks = (startDate, weeks = 2) => {
                const dates = [];
                const start = new Date(startDate);
                for (let i = 0; i < weeks * 7; i++) {
                  const date = new Date(start);
                  date.setDate(start.getDate() + i);
                  dates.push(date.toISOString().split('T')[0]);
                }
                return dates;
              };
              
              const dates = getDatesForWeeks(assignStartDate, 2);
              
              // 날짜 포맷 함수
              const formatDate = (dateStr) => {
                const date = new Date(dateStr);
                const month = date.getMonth() + 1;
                const day = date.getDate();
                const dayNames = ['일', '월', '화', '수', '목', '금', '토'];
                const dayName = dayNames[date.getDay()];
                return { display: `${month}/${day}(${dayName})`, isWeekend: date.getDay() === 0 || date.getDay() === 6, isSunday: date.getDay() === 0 };
              };
              
              // 데이터 구조: lineAssignments[date][section][shift][process][slotIndex] = empId
              const getSlotData = (date, shift, process, slotIndex) => {
                return lineAssignments[date]?.[personnelSection]?.[shift]?.[process]?.[slotIndex] || null;
              };
              
              const setSlotData = (date, shift, process, slotIndex, empId) => {
                setLineAssignments(prev => {
                  const newData = { ...prev };
                  if (!newData[date]) newData[date] = {};
                  if (!newData[date][personnelSection]) newData[date][personnelSection] = {};
                  if (!newData[date][personnelSection][shift]) newData[date][personnelSection][shift] = {};
                  if (!newData[date][personnelSection][shift][process]) newData[date][personnelSection][shift][process] = {};
                  newData[date][personnelSection][shift][process][slotIndex] = empId;
                  return newData;
                });
              };
              
              // 휴가자 데이터
              const getVacationSlot = (date, slotIndex) => {
                return lineAssignments[date]?.[personnelSection]?.['휴가']?.[slotIndex] || null;
              };
              
              const setVacationSlot = (date, slotIndex, empId) => {
                setLineAssignments(prev => {
                  const newData = { ...prev };
                  if (!newData[date]) newData[date] = {};
                  if (!newData[date][personnelSection]) newData[date][personnelSection] = {};
                  if (!newData[date][personnelSection]['휴가']) newData[date][personnelSection]['휴가'] = {};
                  newData[date][personnelSection]['휴가'][slotIndex] = empId;
                  return newData;
                });
              };
              
              // 조장 데이터
              const getLeaderSlot = (date, shift, slotIndex) => {
                return lineAssignments[date]?.[personnelSection]?.[shift]?.['조장']?.[slotIndex] || null;
              };
              
              const setLeaderSlot = (date, shift, slotIndex, empId) => {
                setLineAssignments(prev => {
                  const newData = { ...prev };
                  if (!newData[date]) newData[date] = {};
                  if (!newData[date][personnelSection]) newData[date][personnelSection] = {};
                  if (!newData[date][personnelSection][shift]) newData[date][personnelSection][shift] = {};
                  if (!newData[date][personnelSection][shift]['조장']) newData[date][personnelSection][shift]['조장'] = {};
                  newData[date][personnelSection][shift]['조장'][slotIndex] = empId;
                  return newData;
                });
              };
              
              // 해당 날짜에 배치된 모든 직원 ID
              const getAssignedIds = (date) => {
                const assigned = [];
                const dayData = lineAssignments[date]?.[personnelSection];
                if (dayData) {
                  // 주간/야간 처리
                  ['주간', '야간'].forEach(shift => {
                    if (dayData[shift]) {
                      Object.values(dayData[shift]).forEach(slots => {
                        if (typeof slots === 'object') {
                          Object.values(slots).forEach(empId => {
                            if (empId) assigned.push(empId);
                          });
                        }
                      });
                    }
                  });
                  // 휴가 처리 (구조가 다름: 휴가[slotIndex] = empId)
                  if (dayData['휴가']) {
                    Object.values(dayData['휴가']).forEach(empId => {
                      if (empId) assigned.push(empId);
                    });
                  }
                }
                return assigned;
              };
              
              // 활성 직원
              const activeEmps = employees.filter(emp => emp.section === personnelSection && !emp.leaveDate);
              
              // 주 이동
              const moveWeek = (direction) => {
                const current = new Date(assignStartDate);
                current.setDate(current.getDate() + (direction * 7));
                setAssignStartDate(current.toISOString().split('T')[0]);
              };
              
              // 전일 데이터 복사
              const copyFromPreviousDay = (targetDate) => {
                const target = new Date(targetDate);
                target.setDate(target.getDate() - 1);
                const prevDate = target.toISOString().split('T')[0];
                
                // 전일 데이터가 있는지 확인
                const prevData = lineAssignments[prevDate]?.[personnelSection];
                if (!prevData) {
                  setFormError('전일 데이터가 없습니다.');
                  return;
                }
                
                // 배치 데이터 복사
                setLineAssignments(prev => ({
                  ...prev,
                  [targetDate]: {
                    ...prev[targetDate],
                    [personnelSection]: JSON.parse(JSON.stringify(prevData))
                  }
                }));
                
                // 슬롯 상태 복사
                const newSlotStatus = { ...slotStatus };
                Object.keys(slotStatus).forEach(key => {
                  if (key.startsWith(`${prevDate}_${personnelSection}_`)) {
                    const newKey = key.replace(`${prevDate}_`, `${targetDate}_`);
                    newSlotStatus[newKey] = slotStatus[key];
                  }
                });
                setSlotStatus(newSlotStatus);
              };
              
              // 드래그 핸들러
              const handleDragStart = (e, empId) => {
                e.dataTransfer.setData('empId', empId.toString());
                setDraggedEmployee(employees.find(emp => emp.id === empId));
              };
              
              const handleDragEnd = () => {
                setDraggedEmployee(null);
              };
              
              const handleDrop = (e, date, shift, process, slotIndex, maxSlots) => {
                e.preventDefault();
                const empId = parseInt(e.dataTransfer.getData('empId'));
                if (empId) {
                  // 기존 위치에서 제거
                  const dayData = lineAssignments[date]?.[personnelSection];
                  if (dayData) {
                    ['주간', '야간', '휴가'].forEach(s => {
                      if (dayData[s]) {
                        Object.keys(dayData[s]).forEach(p => {
                          if (dayData[s][p] && typeof dayData[s][p] === 'object') {
                            Object.keys(dayData[s][p]).forEach(idx => {
                              if (dayData[s][p][idx] === empId) {
                                if (s === '휴가') {
                                  setVacationSlot(date, parseInt(idx), null);
                                } else if (p === '조장') {
                                  setLeaderSlot(date, s, parseInt(idx), null);
                                } else {
                                  setSlotData(date, s, p, parseInt(idx), null);
                                }
                              }
                            });
                          }
                        });
                      }
                    });
                  }
                  // 첫 번째 빈 슬롯 찾기
                  let targetSlot = 0;
                  if (shift === '휴가') {
                    for (let i = 0; i < maxSlots; i++) {
                      if (!getVacationSlot(date, i)) {
                        targetSlot = i;
                        break;
                      }
                    }
                    setVacationSlot(date, targetSlot, empId);
                  } else if (process === '조장') {
                    for (let i = 0; i < maxSlots; i++) {
                      if (!getLeaderSlot(date, shift, i)) {
                        targetSlot = i;
                        break;
                      }
                    }
                    setLeaderSlot(date, shift, targetSlot, empId);
                  } else {
                    for (let i = 0; i < maxSlots; i++) {
                      if (!getSlotData(date, shift, process, i)) {
                        targetSlot = i;
                        break;
                      }
                    }
                    setSlotData(date, shift, process, targetSlot, empId);
                  }
                }
                setDraggedEmployee(null);
              };
              
              // 슬롯에서 직원 제거 후 재정렬
              const removeFromSlot = (date, shift, process, slotIndex) => {
                if (shift === '휴가') {
                  // 휴가 슬롯 재정렬
                  const slots = [];
                  for (let i = 0; i < vacationSlots; i++) {
                    const emp = getVacationSlot(date, i);
                    if (emp && i !== slotIndex) slots.push(emp);
                  }
                  // 재배치
                  setLineAssignments(prev => {
                    const newData = { ...prev };
                    if (!newData[date]) newData[date] = {};
                    if (!newData[date][personnelSection]) newData[date][personnelSection] = {};
                    if (!newData[date][personnelSection]['휴가']) newData[date][personnelSection]['휴가'] = {};
                    // 초기화 후 재배치
                    newData[date][personnelSection]['휴가'] = {};
                    slots.forEach((empId, idx) => {
                      newData[date][personnelSection]['휴가'][idx] = empId;
                    });
                    return newData;
                  });
                } else if (process === '조장') {
                  // 조장 슬롯 재정렬
                  const slots = [];
                  for (let i = 0; i < leaderSlots; i++) {
                    const emp = getLeaderSlot(date, shift, i);
                    if (emp && i !== slotIndex) slots.push(emp);
                  }
                  setLineAssignments(prev => {
                    const newData = { ...prev };
                    if (!newData[date]) newData[date] = {};
                    if (!newData[date][personnelSection]) newData[date][personnelSection] = {};
                    if (!newData[date][personnelSection][shift]) newData[date][personnelSection][shift] = {};
                    newData[date][personnelSection][shift]['조장'] = {};
                    slots.forEach((empId, idx) => {
                      newData[date][personnelSection][shift]['조장'][idx] = empId;
                    });
                    return newData;
                  });
                } else {
                  // 일반 공정 슬롯 재정렬
                  const processInfo = processes.find(p => p.name === process);
                  const maxSlots = processInfo ? processInfo.slots : 4;
                  const slots = [];
                  for (let i = 0; i < maxSlots; i++) {
                    const emp = getSlotData(date, shift, process, i);
                    if (emp && i !== slotIndex) slots.push(emp);
                  }
                  setLineAssignments(prev => {
                    const newData = { ...prev };
                    if (!newData[date]) newData[date] = {};
                    if (!newData[date][personnelSection]) newData[date][personnelSection] = {};
                    if (!newData[date][personnelSection][shift]) newData[date][personnelSection][shift] = {};
                    newData[date][personnelSection][shift][process] = {};
                    slots.forEach((empId, idx) => {
                      newData[date][personnelSection][shift][process][idx] = empId;
                    });
                    return newData;
                  });
                }
                
                // 슬롯 상태도 재정렬
                setSlotStatus(prev => {
                  const newStatus = { ...prev };
                  const prefix = `${date}_${personnelSection}_${shift}_${process}_`;
                  // 해당 공정의 상태 수집 (삭제된 것 제외)
                  const statuses = [];
                  const maxSlots = process === '조장' ? leaderSlots : 
                                   shift === '휴가' ? vacationSlots :
                                   (processes.find(p => p.name === process)?.slots || 4);
                  for (let i = 0; i < maxSlots; i++) {
                    if (i !== slotIndex && prev[prefix + i]) {
                      statuses.push(prev[prefix + i]);
                    } else if (i !== slotIndex) {
                      statuses.push(0);
                    }
                  }
                  // 기존 상태 삭제
                  for (let i = 0; i < maxSlots; i++) {
                    delete newStatus[prefix + i];
                  }
                  // 재배치
                  statuses.forEach((status, idx) => {
                    if (status !== 0) newStatus[prefix + idx] = status;
                  });
                  return newStatus;
                });
              };
              
              // 슬롯 클릭 - 선택 (더블클릭 배치용)
              const handleSlotClick = (date, shift, process, maxSlots) => {
                setSelectedSlot({ date, shift, process, maxSlots });
              };
              
              // 미배치 인원 더블클릭 - 선택된 슬롯에 배치
              const handleEmployeeDoubleClick = (empId, date) => {
                if (selectedSlot && selectedSlot.date === date) {
                  const { shift, process, maxSlots } = selectedSlot;
                  
                  // 첫 번째 빈 슬롯 찾기
                  let targetSlot = -1;
                  if (shift === '휴가') {
                    for (let i = 0; i < maxSlots; i++) {
                      if (!getVacationSlot(date, i)) {
                        targetSlot = i;
                        break;
                      }
                    }
                    if (targetSlot >= 0) setVacationSlot(date, targetSlot, empId);
                  } else if (process === '조장') {
                    for (let i = 0; i < maxSlots; i++) {
                      if (!getLeaderSlot(date, shift, i)) {
                        targetSlot = i;
                        break;
                      }
                    }
                    if (targetSlot >= 0) setLeaderSlot(date, shift, targetSlot, empId);
                  } else {
                    for (let i = 0; i < maxSlots; i++) {
                      if (!getSlotData(date, shift, process, i)) {
                        targetSlot = i;
                        break;
                      }
                    }
                    if (targetSlot >= 0) setSlotData(date, shift, process, targetSlot, empId);
                  }
                }
              };
              
              // 슬롯 상태 가져오기/설정하기
              const getSlotStatus = (date, shift, process, slotIndex) => {
                const key = `${date}_${personnelSection}_${shift}_${process}_${slotIndex}`;
                return slotStatus[key] || 0; // 0: 정상(초록), 1: 빨강, 2: 반빨강
              };
              
              const toggleSlotStatus = (date, shift, process, slotIndex) => {
                const key = `${date}_${personnelSection}_${shift}_${process}_${slotIndex}`;
                const current = slotStatus[key] || 0;
                const next = (current + 1) % 4; // 0 → 1 → 2 → 3 → 0 (정상 → 잔업불가 → 오후반차 → 오전반차)
                
                // 해당 슬롯의 직원 ID 가져오기
                let empId;
                if (process === '조장') {
                  empId = getLeaderSlot(date, shift, slotIndex);
                } else {
                  empId = getSlotData(date, shift, process, slotIndex);
                }
                
                // 상태 업데이트
                setSlotStatus(prev => ({ ...prev, [key]: next }));
                
                // 반차(2 또는 3) 상태가 되면 휴가에 자동 추가
                if ((next === 2 || next === 3) && empId) {
                  // 이미 휴가에 있는지 확인
                  const vacationData = lineAssignments[date]?.[personnelSection]?.['휴가'] || {};
                  const alreadyInVacation = Object.values(vacationData).includes(empId);
                  
                  if (!alreadyInVacation) {
                    // 빈 슬롯 찾아서 추가
                    let newSlotIndex = 0;
                    while (vacationData[newSlotIndex]) {
                      newSlotIndex++;
                    }
                    setVacationSlot(date, newSlotIndex, empId);
                  }
                }
                
                // 반차에서 정상(0)으로 돌아가면 휴가에서 제거
                if ((current === 2 || current === 3) && next === 0 && empId) {
                  setLineAssignments(prev => {
                    const newData = { ...prev };
                    const vacationData = newData[date]?.[personnelSection]?.['휴가'];
                    if (vacationData) {

                    return newData;

                        const parts = key.split('_');

                        {/* 휴가 */}

{/* OT/휴가 서브탭 */}
            {personnelSubTab === 'otvac' && (() => {

              const tcpEmployees = employees.filter(e => (e.section === 'TCP' || (e.section || '').toUpperCase() === 'TCP') && !e.leaveDate);
              
              // 디버그용 섹션별 카운트 (미리 계산)
              const sectionCounts = {};
              employees.forEach(e => {
                const s = e.section || '(없음)';
                sectionCounts[s] = (sectionCounts[s] || 0) + 1;
              });
              const sectionLabel = Object.keys(sectionCounts).map(k => k + '=' + sectionCounts[k] + '명').join(' | ');
              
              const updateOtVac = (date, name, key, value) => {
                setOtVacationData(prev => {
                  const next = { ...prev };
                  if (!next[date]) next[date] = {};
                  if (!next[date][name]) next[date][name] = { type: '', shift: '', vacation: '', ot: 0 };
                  next[date][name] = { ...next[date][name], [key]: value };
                  
                  // 상태 변경 시 자동 정리
                  if (key === 'type') {
                    if (value === 'work' || value === 'special') {
                      next[date][name].vacation = '';
                      if (!next[date][name].shift) next[date][name].shift = '주간';
                    } else if (value === 'vacation') {
                      next[date][name].shift = '';
                      if (!next[date][name].vacation) next[date][name].vacation = '연차';
                    } else {
                      next[date][name].shift = '';
                      next[date][name].vacation = '';
                    }
                  }
                  
                  // 빈 데이터 정리
                  const d = next[date][name];
                  const noOt = (!d.ot || d.ot === 0) && (!d.ot15 || d.ot15 === 0) && (!d.ot20 || d.ot20 === 0);
                  if (!d.type && !d.shift && !d.vacation && noOt) {
                    delete next[date][name];
                  }
                  if (next[date] && Object.keys(next[date]).length === 0) delete next[date];
                  
                  localStorage.setItem('tcpOtVacationData', JSON.stringify(next));
                  return next;
                });

              const copyFromPrevDay = () => {

                setOtVacationData(p => {

                            const headers = rows[0];
                            const hasId = headers[0] === 'ID';
                            
                            for (let i = 1; i < rows.length; i++) {

                            const headers = rows[0];
                            const hasId = headers[0] === 'ID';

                              }
                            }

                                station: String(row[idx+1] || ''),
                                defectType: String(row[idx+2] || ''),
                                defectSubType: String(row[idx+3] || ''),
                                quantity: Number(row[idx+4]) || 0
                              };
                              if (newLog.station && newLog.defectType) {
                                setDefectLogs(prev => [...prev, newLog]);
                                importedDefect++;
                              }
                            }
                          }
                          
                          // 공정불량 시트 처리
                          if (workbook.SheetNames.includes('공정불량')) {
                            const ws = workbook.Sheets['공정불량'];
                            const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });
                            const headers = rows[0];
                            const hasId = headers[0] === 'ID';
                            
                            for (let i = 1; i < rows.length; i++) {
                              const row = rows[i];
                              if (!row || row.length === 0) continue;
                              
                              const idx = hasId ? 1 : 0;
                              const prodLogId = Number(row[idx]);
                              if (!prodLogId) continue;
                              
                              const newLog = {
                                id: Date.now() + 30000 + i,
                                productionLogId: prodLogId,
                                station: String(row[idx+1] || ''),
                                defectType: String(row[idx+2] || ''),
                                defectSubType: String(row[idx+3] || ''),
                                quantity: Number(row[idx+4]) || 0
                              };
                              if (newLog.station && newLog.defectType) {
                                setProcessDefectLogs(prev => [...prev, newLog]);
                                importedProcDefect++;
                              }
                            }
                          }
                          
                          // 재작업 시트 처리
                          if (workbook.SheetNames.includes('재작업')) {
                            const ws = workbook.Sheets['재작업'];

                                reworkType: String(row[idx+2] || ''),
                                quantity: Number(row[idx+3]) || 0
                              };
                              if (newLog.station && newLog.reworkType) {
                                setReworkLogs(prev => [...prev, newLog]);
                                importedRework++;
                              }
                            }
                          }
                          
                          setFormError(`✅ 업로드 완료!\n생산일지: ${importedProd}건\n비가동: ${importedDown}건\n불량: ${importedDefect}건\n공정불량: ${importedProcDefect}건\n재작업: ${importedRework}건`);

                    const defectTypeWs = XLSX.utils.aoa_to_sheet(defectTypeData);
                    defectTypeWs['!cols'] = [{ wch: 15 }, { wch: 15 }, { wch: 20 }, { wch: 20 }, { wch: 15 }, { wch: 15 }];
                    XLSX.utils.book_append_sheet(wb, defectTypeWs, 'TCP_불량종류');
                    
                    // TCP 불량코드 내보내기
                    const defectCodeHeaders = ['불량코드'];
                    const defectCodeData = [defectCodeHeaders, ...(settings.TCP.defectCodes || []).map(code => [code])];
                    const defectCodeWs = XLSX.utils.aoa_to_sheet(defectCodeData);
                    defectCodeWs['!cols'] = [{ wch: 30 }];
                    XLSX.utils.book_append_sheet(wb, defectCodeWs, 'TCP_불량코드');
                    
                    
                    XLSX.writeFile(wb, `TCP_설정데이터_${new Date().toISOString().split('T')[0]}.xlsx`);
                  }}
                  className="px-4 py-2 bg-cyan-600 text-white rounded-lg font-medium hover:bg-cyan-700 flex items-center gap-2"
                >
                  📤 현재 설정 내보내기
                </button>
                
                {/* 설정 파일 업로드 */}
                <label className="px-4 py-2 bg-amber-500 text-white rounded-lg font-medium hover:bg-amber-600 flex items-center gap-2 cursor-pointer">
                  📂 설정 파일 업로드
                  <input
                    type="file"
                    accept=".xlsx,.xls"
                    className="hidden"
                    onChange={(e) => {
                      const file = e.target.files[0];
                      if (!file) return;
                      
                      const XLSX = window.XLSX;
                      if (!XLSX) {
                        setFormError('엑셀 라이브러리를 로딩 중입니다. 잠시 후 다시 시도해주세요.');
                        return;
                      }
                      
                      const reader = new FileReader();
                      reader.onload = (evt) => {
                        try {
                          const data = new Uint8Array(evt.target.result);
                          const workbook = XLSX.read(data, { type: 'array' });
                          
                          let importedLines = { TCP: 0 };
                          let importedItems = { TCP: 0 };
                          let importedBom = { TCP: 0 };
                          let importedCt = { TCP: 0 };
                          let importedDowntime = 0;
                          let importedDefectTypes = { TCP: 0 };
                          let importedDefectCodes = { TCP: 0 };
                          
                          // 모든 변경사항을 한 번에 적용
                          setSettings(prev => {
                            let newSettings = JSON.parse(JSON.stringify(prev)); // deep clone
                            
                            // 라인 시트 처리
                            const lineSheetName = 'TCP_라인';
                            if (workbook.SheetNames.includes(lineSheetName)) {
                              const ws = workbook.Sheets[lineSheetName];
                              const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });
                              
                              const lineMap = {};
                              for (let i = 1; i < rows.length; i++) {
                                const row = rows[i];
                                if (!row || !row[0]) continue;
                                
                                const lineName = String(row[0]).trim();
                                const stations = row[1] ? String(row[1]).split(',').map(s => s.trim()).filter(s => s) : [];
                                
                                if (!lineMap[lineName]) {
                                  lineMap[lineName] = [];
                                }
                                stations.forEach(st => {
                                  if (!lineMap[lineName].includes(st)) {
                                    lineMap[lineName].push(st);
                                  }
                                });
                              }
                              
                              Object.entries(lineMap).forEach(([lineName, stations]) => {
                                const existingIdx = newSettings.TCP.lines.findIndex(l => l.name === lineName);
                                if (existingIdx >= 0) {
                                  const existingStations = newSettings.TCP.lines[existingIdx].stations || [];
                                  let addedCount = 0;
                                  stations.forEach(st => {
                                    if (!existingStations.includes(st)) {
                                      existingStations.push(st);
                                      addedCount++;
                                    }
                                  });
                                  newSettings.TCP.lines[existingIdx].stations = existingStations;
                                  if (addedCount > 0) importedLines.TCP++;
                                } else {
                                  newSettings.TCP.lines.push({ name: lineName, stations });
                                  importedLines.TCP++;
                                }
                              });
                            }
                            
                            // 아이템 시트 처리
                            const itemSheetName = 'TCP_아이템';
                            if (workbook.SheetNames.includes(itemSheetName)) {
                              const ws = workbook.Sheets[itemSheetName];
                              const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });
                              
                              const itemMap = {};
                              for (let i = 1; i < rows.length; i++) {
                                const row = rows[i];
                                if (!row || !row[0]) continue;
                                
                                const itemName = String(row[0]).trim();
                                const lineName = row[1] ? String(row[1]).trim() : '';
                                const partNos = row[2] ? String(row[2]).split(',').map(s => s.trim()).filter(s => s) : [];
                                
                                if (!itemMap[itemName]) {
                                  itemMap[itemName] = { lineName, partNos: [] };
                                }
                                if (lineName) {
                                  itemMap[itemName].lineName = lineName;
                                }
                                partNos.forEach(pn => {
                                  if (!itemMap[itemName].partNos.includes(pn)) {
                                    itemMap[itemName].partNos.push(pn);
                                  }
                                });
                              }
                              
                              Object.entries(itemMap).forEach(([itemName, { lineName, partNos }]) => {
                                const existingIdx = newSettings.TCP.items.findIndex(item => item.item === itemName);
                                if (existingIdx >= 0) {
                                  const existingPartNos = newSettings.TCP.items[existingIdx].partNos || [];
                                  let addedCount = 0;
                                  partNos.forEach(pn => {
                                    if (!existingPartNos.some(p => p.partNo === pn)) {
                                      existingPartNos.push({ partNo: pn, bom: [] });
                                      addedCount++;
                                    }
                                  });
                                  newSettings.TCP.items[existingIdx].partNos = existingPartNos;
                                  if (lineName) newSettings.TCP.items[existingIdx].lineName = lineName;
                                  if (addedCount > 0) importedItems.TCP++;
                                } else {
                                  newSettings.TCP.items.push({ 
                                    item: itemName, 
                                    lineName: lineName,
                                    partNos: partNos.map(pn => ({ partNo: pn, bom: [] })),
                                    ct: [],
                                    excludeFromOEE: false
                                  });
                                  importedItems.TCP++;
                                }
                              });
                            }
                            
                            // BOM 시트 처리
                            const bomSheetName = 'TCP_BOM';
                            if (workbook.SheetNames.includes(bomSheetName)) {
                              const ws = workbook.Sheets[bomSheetName];
                              const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });
                              
                              for (let i = 1; i < rows.length; i++) {
                                const row = rows[i];
                                if (!row || !row[0] || !row[1] || !row[2]) continue;
                                
                                const itemName = String(row[0]).trim();
                                const partNo = String(row[1]).trim();
                                const bomName = String(row[2]).trim();
                                const productName = row[3] ? String(row[3]).trim() : '';
                                const bomQty = Number(row[4]) || 1;
                                
                                if (!bomName) continue;
                                
                                const itemIdx = newSettings.TCP.items.findIndex(item => item.item === itemName);
                                if (itemIdx >= 0) {
                                  const pnIdx = newSettings.TCP.items[itemIdx].partNos.findIndex(pn => pn.partNo === partNo);
                                  if (pnIdx >= 0) {
                                    const existingBom = newSettings.TCP.items[itemIdx].partNos[pnIdx].bom || [];
                                    if (!existingBom.some(b => b.name === bomName)) {
                                      existingBom.push({ name: bomName, productName, quantity: bomQty });
                                      newSettings.TCP.items[itemIdx].partNos[pnIdx].bom = existingBom;
                                      importedBom.TCP++;
                                    }
                                  }
                                }
                              }
                            }
                            
                            // CT 시트 처리
                            const ctSheetName = 'TCP_CT';
                            if (workbook.SheetNames.includes(ctSheetName)) {
                              const ws = workbook.Sheets[ctSheetName];
                              const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });
                              
                              for (let i = 1; i < rows.length; i++) {
                                const row = rows[i];
                                if (!row || !row[0]) continue;
                                
                                const itemName = String(row[0]).trim();
                                const workers = Number(row[1]) || 1;
                                const startDate = row[2] ? String(row[2]).substring(0, 10) : '';
                                const endDate = row[3] ? String(row[3]).substring(0, 10) : '';
                                const baseQty = Number(row[4]) || 0;
                                const planQty = Number(row[5]) || 0;
                                const excludeFromOEE = String(row[6] || '').toUpperCase() === 'Y';
                                
                                const itemIdx = newSettings.TCP.items.findIndex(item => item.item === itemName);
                                if (itemIdx >= 0) {
                                  const existingCt = newSettings.TCP.items[itemIdx].ct || [];
                                  const existingCtIdx = existingCt.findIndex(c => c.workers === workers);
                                  if (existingCtIdx < 0) {
                                    existingCt.push({ workers, startDate, endDate, baseQty, planQty });
                                    newSettings.TCP.items[itemIdx].ct = existingCt;
                                    importedCt.TCP++;
                                  }
                                  newSettings.TCP.items[itemIdx].excludeFromOEE = excludeFromOEE;
                                }
                              }
                            }
                            
                            // 비가동유형 시트 처리
                            if (workbook.SheetNames.includes('비가동유형')) {
                              const ws = workbook.Sheets['비가동유형'];
                              const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });
                              
                              for (let i = 1; i < rows.length; i++) {
                                const row = rows[i];
                                if (!row || !row[0]) continue;
                                
                                const typeName = String(row[0]).trim();
                                const category = row[1] ? String(row[1]).trim() : '비가동';
                                
                                const exists = newSettings.common.downtimeTypes.some(dt => dt.name === typeName);
                                if (!exists && typeName) {
                                  newSettings.common.downtimeTypes.push({ name: typeName, category });
                                  importedDowntime++;
                                }
                              }
                            }
                            
                            // 불량종류 시트 처리
                            const defectTypeSheetName = 'TCP_불량종류';
                            if (workbook.SheetNames.includes(defectTypeSheetName)) {
                              const ws = workbook.Sheets[defectTypeSheetName];
                              const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });
                              
                              const defectMap = {};
                              for (let i = 1; i < rows.length; i++) {
                                const row = rows[i];
                                if (!row || !row[2]) continue;
                                
                                const lineName = row[0] ? String(row[0]).trim() : '';
                                const station = row[1] ? String(row[1]).trim() : '';
                                const mainType = String(row[2]).trim();
                                const subType = row[3] ? String(row[3]).trim() : '';
                                const ftfr = String(row[4] || 'Y').toUpperCase() === 'Y';
                                const oee = String(row[5] || 'Y').toUpperCase() === 'Y';
                                
                                const key = `${lineName}|${station}|${mainType}`;
                                if (!defectMap[key]) {
                                  defectMap[key] = { lineName, station, mainType, subTypes: [] };
                                }
                                if (subType) {
                                  defectMap[key].subTypes.push({ name: subType, ftfr, oee });
                                }
                              }
                              
                              Object.values(defectMap).forEach(({ lineName, station, mainType, subTypes }) => {
                                if (!newSettings.TCP.defectTypes) newSettings.TCP.defectTypes = [];
                                const existingIdx = newSettings.TCP.defectTypes.findIndex(dt => 
                                  dt.name === mainType && 
                                  (dt.lineName || '') === lineName && 
                                  (dt.station || '') === station
                                );
                                if (existingIdx >= 0) {
                                  const existingSubNames = newSettings.TCP.defectTypes[existingIdx].subTypes.map(st => st.name);
                                  subTypes.forEach(st => {
                                    if (!existingSubNames.includes(st.name)) {
                                      newSettings.TCP.defectTypes[existingIdx].subTypes.push(st);
                                      importedDefectTypes.TCP++;
                                    }
                                  });
                                } else {
                                  newSettings.TCP.defectTypes.push({ name: mainType, lineName, station, subTypes });
                                  importedDefectTypes.TCP += subTypes.length || 1;
                                }
                              });
                            }
                            
                            // 불량코드 시트 처리
                            const defectCodeSheetName = 'TCP_불량코드';
                            if (workbook.SheetNames.includes(defectCodeSheetName)) {
                              const ws = workbook.Sheets[defectCodeSheetName];
                              const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });
                              
                              if (!newSettings.TCP.defectCodes) newSettings.TCP.defectCodes = [];
                              for (let i = 1; i < rows.length; i++) {
                                const row = rows[i];
                                if (!row || !row[0]) continue;
                                
                                const code = String(row[0]).trim();
                                if (!newSettings.TCP.defectCodes.includes(code)) {
                                  newSettings.TCP.defectCodes.push(code);
                                  importedDefectCodes.TCP++;
                                }
                              }
                            }
                            
                            return newSettings;
                          });
                          
                          setTimeout(() => {
                            setFormError(`✅ 설정 업로드 완료!\n\nTCP: 라인 ${importedLines.TCP}건, 아이템 ${importedItems.TCP}건, BOM ${importedBom.TCP}건, CT ${importedCt.TCP}건, 불량종류 ${importedDefectTypes.TCP}건, 불량코드 ${importedDefectCodes.TCP}건\n비가동유형: ${importedDowntime}건`);
                          }, 100);
                          
                        } catch (err) {
                          setFormError('엑셀 파일 읽기 오류: ' + err.message);
                        }
                      };
                      reader.readAsArrayBuffer(file);
                      e.target.value = '';
                    }}
                  />
                </label>
              </div>
              <p className="mt-3 text-sm text-teal-600">
                💡 설정 템플릿을 다운로드하여 라인/아이템/Part No/BOM/CT를 일괄 등록하세요. 기존 설정에 추가됩니다.
              </p>
            </div>
            
            {/* 카테고리 탭 */}
            <div className="flex gap-2 mb-6 border-b">
              {Object.keys(categoryLabels).map(cat => (
                <button
                  key={cat}
                  type="button"
                  onClick={() => { setSettingCategory(cat); setSelectedPartNoIndex(null); }}
                  className={`px-4 py-2 text-sm font-medium transition-colors ${
                    settingCategory === cat
                      ? cat === 'downtimeTypes'
                        ? 'text-gray-700 border-b-2 border-gray-500'
                        : 'text-blue-600 border-b-2 border-blue-600'
                      : 'text-gray-500 hover:text-gray-700'
                  }`}
                >
                  {categoryLabels[cat]}
                </button>
              ))}
            </div>
            
            {/* 아이템/Part No/BOM 관리 */}
            {settingCategory === 'items' ? (
              <div className="space-y-6">
                {/* 3단 레이아웃: 아이템 | Part No | BOM */}
                <div className="grid grid-cols-3 gap-4">
                  {/* 아이템 목록 */}
                  <div>
                    <div className="flex flex-col gap-2 mb-3">
                      <div className="flex gap-2">
                        <select
                          value={newItemLine}
                          onChange={(e) => setNewItemLine(e.target.value)}
                          className="px-3 py-2 border border-gray-300 rounded-lg text-sm bg-white"
                        >
                          <option value="">라인 선택</option>
                          {settings[settingSection].lines.map(line => (
                            <option key={line.name} value={line.name}>{line.name}</option>
                          ))}
                        </select>
                        <input
                          type="text"
                          value={newSettingValue}
                          onChange={(e) => setNewSettingValue(e.target.value)}
                          placeholder="새 아이템 입력"
                          className="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm"
                          onKeyPress={(e) => e.key === 'Enter' && addSettingItem()}
                        />
                        <button
                          type="button"
                          onClick={addSettingItem}
                          className={`px-3 py-2 text-white rounded-lg font-medium text-sm ${
                            settingSection === 'TCP' ? 'bg-blue-600 hover:bg-blue-700' : 'bg-green-600 hover:bg-green-700'
                          }`}
                        >
                          추가
                        </button>
                      </div>
                    </div>
                    
                    <div className="border rounded-lg overflow-hidden">
                      <div className={`px-3 py-2 font-medium text-sm flex justify-between items-center ${
                        settingSection === 'TCP' ? 'bg-blue-50 text-blue-800' : 'bg-green-50 text-green-800'
                      }`}>
                        <span>아이템 ({settings[settingSection].items.length}개)</span>
                        <span className="text-xs font-normal opacity-70">💡 더블클릭으로 수정</span>
                      </div>
                      <div className="divide-y max-h-80 overflow-y-auto">
                        {settings[settingSection].items.length === 0 ? (
                          <div className="px-3 py-6 text-center text-gray-400 text-sm">없음</div>
                        ) : (
                          settings[settingSection].items.map((item, index) => (
                            <div 
                              key={index} 
                              className={`flex items-center justify-between px-3 py-2 cursor-pointer text-sm ${
                                selectedItemIndex === index 
                                  ? settingSection === 'TCP' ? 'bg-blue-100' : 'bg-green-100'
                                  : 'hover:bg-gray-50'
                              }`}
                              onClick={() => { setSelectedItemIndex(index); setSelectedPartNoIndex(null); }}
                              onDoubleClick={(e) => {
                                e.stopPropagation();
                                const newName = prompt(`아이템명 수정\n\n기존: ${item.item}\n새 이름:`, item.item);
                                if (newName) renameItem(settingSection, item.item, newName);
                              }}
                            >
                              <div className="flex items-center gap-2">
                                {/* 순서 변경 버튼 */}
                                <div className="flex flex-col gap-0.5">
                                  <button
                                    type="button"
                                    onClick={(e) => { e.stopPropagation(); moveSettingItem(settingSection, 'items', index, -1); }}
                                    disabled={index === 0}
                                    className={`text-xs px-1 py-0 rounded ${index === 0 ? 'text-gray-300' : 'text-gray-500 hover:text-gray-700 hover:bg-gray-200'}`}
                                  >▲</button>
                                  <button
                                    type="button"
                                    onClick={(e) => { e.stopPropagation(); moveSettingItem(settingSection, 'items', index, 1); }}
                                    disabled={index === settings[settingSection].items.length - 1}
                                    className={`text-xs px-1 py-0 rounded ${index === settings[settingSection].items.length - 1 ? 'text-gray-300' : 'text-gray-500 hover:text-gray-700 hover:bg-gray-200'}`}
                                  >▼</button>
                                </div>
                                <div className="flex flex-col">
                                  <div className="flex items-center gap-1">
                                    <span className="font-medium">{item.item}</span>
                                    <span className="text-xs text-gray-500">({item.partNos.length})</span>
                                  </div>
                                  {item.lineName && (
                                    <span className="text-xs text-gray-400">📍 {item.lineName}</span>
                                  )}
                                </div>
                              </div>
                              <div className="flex items-center gap-1">
                                <select
                                  value={item.lineName || ''}
                                  onChange={(e) => {
                                    e.stopPropagation();
                                    setSettings(prev => ({
                                      ...prev,
                                      [settingSection]: {
                                        ...prev[settingSection],
                                        items: prev[settingSection].items.map((it, i) => 
                                          i === index ? { ...it, lineName: e.target.value } : it
                                        )
                                      }
                                    }));
                                  }}
                                  onClick={(e) => e.stopPropagation()}
                                  className="text-xs px-1 py-0.5 border rounded"
                                >
                                  <option value="">라인없음</option>
                                  {settings[settingSection].lines.map(line => (
                                    <option key={line.name} value={line.name}>{line.name}</option>
                                  ))}
                                </select>
                                <button
                                  type="button"
                                  onClick={(e) => { e.stopPropagation(); removeSettingItem(settingSection, 'items', item.item); }}
                                  className="text-red-500 hover:text-red-700 text-xs px-2 py-1 rounded hover:bg-red-50"
                                >
                                  삭제
                                </button>
                              </div>
                            </div>
                          ))
                        )}
                      </div>
                    </div>
                  </div>
                  
                  {/* Part No 목록 */}
                  <div>
                    <div className="flex gap-2 mb-3">
                      <input
                        type="text"
                        value={newPartNoValue}
                        onChange={(e) => setNewPartNoValue(e.target.value)}
                        placeholder="새 Part No"
                        className="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm"
                        disabled={selectedItemIndex === null}
                        onKeyPress={(e) => e.key === 'Enter' && addPartNoToItem()}
                      />
                      <button
                        type="button"
                        onClick={addPartNoToItem}
                        disabled={selectedItemIndex === null}
                        className={`px-3 py-2 text-white rounded-lg font-medium text-sm disabled:bg-gray-300 ${
                          settingSection === 'TCP' ? 'bg-blue-600 hover:bg-blue-700' : 'bg-green-600 hover:bg-green-700'
                        }`}
                      >
                        추가
                      </button>
                    </div>
                    
                    <div className="border rounded-lg overflow-hidden">
                      <div className={`px-3 py-2 font-medium text-sm ${
                        selectedItemIndex !== null
                          ? settingSection === 'TCP' ? 'bg-blue-50 text-blue-800' : 'bg-green-50 text-green-800'
                          : 'bg-gray-50 text-gray-600'
                      }`}>
                        {selectedItemIndex !== null 
                          ? `${settings[settingSection].items[selectedItemIndex].item} Part No`
                          : '아이템 선택'}
                      </div>
                      <div className="divide-y max-h-80 overflow-y-auto">
                        {selectedItemIndex === null ? (
                          <div className="px-3 py-6 text-center text-gray-400 text-sm">아이템 선택 필요</div>
                        ) : settings[settingSection].items[selectedItemIndex].partNos.length === 0 ? (
                          <div className="px-3 py-6 text-center text-gray-400 text-sm">Part No 없음</div>
                        ) : (
                          settings[settingSection].items[selectedItemIndex].partNos.map((pn, index) => (
                            <div 
                              key={index} 
                              className={`flex items-center justify-between px-3 py-2 cursor-pointer text-sm ${
                                selectedPartNoIndex === index 
                                  ? settingSection === 'TCP' ? 'bg-blue-100' : 'bg-green-100'
                                  : 'hover:bg-gray-50'
                              }`}
                              onClick={() => setSelectedPartNoIndex(index)}
                              onDoubleClick={(e) => {
                                e.stopPropagation();
                                const newPartNo = prompt(`Part No 수정\n\n기존: ${pn.partNo}\n새 Part No:`, pn.partNo);
                                if (newPartNo) {
                                  renamePartNo(settingSection, settings[settingSection].items[selectedItemIndex].item, pn.partNo, newPartNo);
                                }
                              }}
                            >
                              <div>
                                <span className="font-medium">{pn.partNo}</span>
                                <span className="ml-1 text-xs text-gray-500">BOM {pn.bom.length}개</span>
                              </div>
                              <div className="flex gap-1">
                                <button
                                  type="button"
                                  onClick={(e) => {
                                    e.stopPropagation();
                                    const newPartNo = prompt(`Part No 수정\n\n기존: ${pn.partNo}\n새 Part No:`, pn.partNo);
                                    if (newPartNo) {
                                      renamePartNo(settingSection, settings[settingSection].items[selectedItemIndex].item, pn.partNo, newPartNo);
                                    }
